  <script>// Playables SDK v1.0.0
    // Game lifecycle bridge: rAF-based game-ready detection + event communication
    (function () {
      'use strict';

      // Idempotency: skip if already initialized (e.g., server-side injection
      // followed by client-side inject-javascript via the Bloks webview component).
      if (window.playablesSDK) return;

      var HANDLER_NAME = 'playablesGameEventHandler';
      var ANDROID_BRIDGE_NAME = '_MetaPlayablesBridge';
      var RAF_FRAME_THRESHOLD = 3;

      var gameReadySent = false;
      var firstInteractionSent = false;
      var errorSent = false;
      var frameCount = 0;
      var originalRAF = window.requestAnimationFrame;

      // --- Transport Layer ---

      function hasIOSBridge() {
        return !!(window.webkit &&
          window.webkit.messageHandlers &&
          window.webkit.messageHandlers[HANDLER_NAME]);
      }

      function hasAndroidBridge() {
        return !!(window[ANDROID_BRIDGE_NAME] &&
          typeof window[ANDROID_BRIDGE_NAME].postEvent === 'function');
      }

      function isInIframe() {
        return !!(window.parent && window.parent !== window);
      }

      function sendEvent(eventName, payload) {
        var message = {
          type: eventName,
          payload: payload || {},
          timestamp: Date.now()
        };

        if (hasIOSBridge()) {
          try {
            window.webkit.messageHandlers[HANDLER_NAME].postMessage(message);
          } catch (e) { /* ignore */ }
          return;
        }

        if (hasAndroidBridge()) {
          try {
            var p = payload || {};
            p.__secureToken = window.__fbAndroidBridgeAuthToken || '';
            window[ANDROID_BRIDGE_NAME].postEvent(
              eventName,
              JSON.stringify(p)
            );
          } catch (e) { /* ignore */ }
          return;
        }

        if (isInIframe()) {
          try {
            window.parent.postMessage(message, '*');
          } catch (e) { /* ignore */ }
          return;
        }
      }

      // --- rAF Game-Ready Detection ---

      function onFrame() {
        if (gameReadySent) return;

        frameCount++;
        if (frameCount >= RAF_FRAME_THRESHOLD) {
          gameReadySent = true;
          sendEvent('game_ready', {
            frame_count: frameCount,
            detected_at: Date.now()
          });
          return;
        }

        originalRAF.call(window, onFrame);
      }

      if (originalRAF) {
        window.requestAnimationFrame = function (callback) {
          if (!gameReadySent) {
            return originalRAF.call(window, function (timestamp) {
              frameCount++;
              if (frameCount >= RAF_FRAME_THRESHOLD && !gameReadySent) {
                gameReadySent = true;
                sendEvent('game_ready', {
                  frame_count: frameCount,
                  detected_at: Date.now()
                });
              }
              callback(timestamp);
            });
          }
          return originalRAF.call(window, callback);
        };
      }

      // --- First User Interaction Detection ---

      function setupFirstInteractionDetection() {
        var events = ['touchstart', 'mousedown', 'keydown'];

        function onFirstInteraction() {
          if (firstInteractionSent) return;
          firstInteractionSent = true;
          sendEvent('user_interaction_start', null);

          for (var i = 0; i < events.length; i++) {
            document.removeEventListener(events[i], onFirstInteraction, true);
          }
        }

        for (var i = 0; i < events.length; i++) {

        }

            completed: true

        },

          errorSent = true;
          sendEvent('error', {
            message: message || 'Unknown error',
            auto_captured: false
          });

    function getEmbeddedProjectData(rootDoc = document) {
      const node = rootDoc.getElementById(EDITABLE_TEMPLATE_SCRIPT_ID);
      if (!node) return null;
      try {

      } catch (err) {
        console.error('Failed to parse editable template data', err);
        return null;
      }

    function detectRatio(width, height) {
      const found = Object.entries(RATIOS).find(([, dims]) => dims[0] === width && dims[1] === height);
      return found ? found[0] : '1:1';
    }

    function serializeLayer(layer) {
      const plain = {};
      Object.keys(layer).forEach(key => {
        if (key === 'img' || key === 'clipImg') return;
        plain[key] = layer[key];
      });
      if (layer.img && layer.img.src) plain.imgSrc = layer.img.src;
      if (layer.clipImg && layer.clipImg.src) plain.clipImgSrc = layer.clipImg.src;
      return plain;
    }

    function exportProjectState() {
      return {
        version: 2,
        savedAt: new Date().toISOString(),
        ratio: detectRatio(W, H),
        width: W,
        height: H,
        selectedId,
        layers: layers.map(serializeLayer)
      };
    }

    function loadImageFromSource(src) {
      return new Promise(resolve => {
        if (!src) {
          resolve(null);
          return;
        }
        const img = new Image();
        img.onload = () => resolve(img);
        img.onerror = () => resolve(null);
        img.src = src;
      });
    }

    async function restoreProjectFromData(project, options = {}) {
      if (!project || !Array.isArray(project.layers) || project.layers.length === 0) {
        if (options.toastMessage !== false) toast('⚠️ Editable template data not found.');
        return false;
      }

      const ratio = project.ratio && RATIOS[project.ratio] ? project.ratio : detectRatio(project.width, project.height);
      const ratioParts = RATIOS[ratio] || [project.width || 1080, project.height || 1080];
      document.getElementById('canvas-ratio').value = ratio;
      W = ratioParts[0];
      H = ratioParts[1];
      canvas.width = W * dpr;
      canvas.height = H * dpr;

      const hydratedLayers = [];
      for (const raw of project.layers) {
        const layer = createLayerRecord({ ...raw });
        if (layer.imgSrc) layer.img = await loadImageFromSource(layer.imgSrc);
        if (layer.clipImgSrc) layer.clipImg = await loadImageFromSource(layer.clipImgSrc);
        delete layer.imgSrc;
        delete layer.clipImgSrc;
        hydratedLayers.push(layer);
      }

      layers = hydratedLayers;
      layerIdCount = Math.max(1, ...layers.map(layer => layer.id || 0)) + 1;
      selectedId = layers.find(layer => layer.id === project.selectedId)?.id || (layers[1]?.id || layers[0]?.id || null);

      const scale = Math.min((window.innerWidth - 650) / W, (window.innerHeight - 100) / H);
      wrap.style.width = `${W * scale}px`;
      wrap.style.height = `${H * scale}px`;
      panOffsetX = 0; panOffsetY = 0;
      wrap.style.transform = `translate(0px, 0px)`;
      updateUI();

      if (options.toastMessage) toast(options.toastMessage);
      return true;
    }

    function populateTemplateGallery() {
      const grid = document.getElementById('tpl-grid-view');
      grid.innerHTML = '';
      
      // Show all built-in TEMPLATE_PARTICLES
      Object.keys(TEMPLATE_PARTICLES).forEach(id => {
        const tplData = TEMPLATE_PARTICLES[id];
        const card = document.createElement('div');
        card.className = 'tpl-card pro';
        card.onclick = () => {
          loadTemplate(id);
          closeTemplateGallery();
        };
        
        card.innerHTML = `
          <div class="tpl-card-thumb">
            <canvas id="thumb-${id}"></canvas>
          </div>
          <div class="tpl-card-label">
            ${tplData.name}
            <span class="tpl-card-tag">INSTANT</span>
          </div>
        `;
        grid.appendChild(card);
        
        // Render a mini preview on the canvas
        setTimeout(() => renderMiniPreview(id, `thumb-${id}`), 50);
      });
    }

    function renderMiniPreview(tplId, canvasId) {
      const tCanvas = document.getElementById(canvasId);
      if (!tCanvas) return;
      const tCtx = tCanvas.getContext('2d');
      const data = TEMPLATE_PARTICLES[tplId];
      if (!data) return;

      const ratio = RATIOS[data.ratio || '1:1'];
      const tw = ratio[0], th = ratio[1];
      tCanvas.width = tw; tCanvas.height = th;

      // Draw background
      const bg = data.particles.find(p => p.type === 'bg');
      if (bg) {
        const grad = tCtx.createLinearGradient(0, 0, tw, th);
        grad.addColorStop(0, bg.c1);
        grad.addColorStop(1, bg.c2);
        tCtx.fillStyle = grad;
        tCtx.fillRect(0, 0, tw, th);
      }

      // Draw simplified versions of other particles
      data.particles.forEach(p => {
        if (p.type === 'bg') return;
        tCtx.globalAlpha = (p.opacity || 100) / 100;
        
        if (p.type === 'shape') {
          tCtx.fillStyle = p.color;
          if (p.sType === 'circle') {
            tCtx.beginPath(); tCtx.arc(p.x, p.y, p.w/2, 0, Math.PI*2); tCtx.fill();
          } else if (p.sType === 'triangle') {
            tCtx.beginPath(); tCtx.moveTo(p.x, p.y - p.h/2); tCtx.lineTo(p.x - p.w/2, p.y + p.h/2); tCtx.lineTo(p.x + p.w/2, p.y + p.h/2); tCtx.closePath(); tCtx.fill();
          } else {
            tCtx.fillRect(p.x - p.w/2, p.y - (p.h||p.w)/2, p.w, (p.h||p.w));
          }
        } else if (p.type === 'text') {
          tCtx.fillStyle = p.color;
          tCtx.font = `bold ${p.size * 0.8}px Arial`;
          tCtx.textAlign = 'center';
          tCtx.fillText(p.text.split('\n')[0].substring(0, 10), p.x, p.y);
        } else if (p.type === 'image') {
          tCtx.fillStyle = '#333';
          tCtx.fillRect(p.x - p.w/2, p.y - p.h/2, p.w, p.h);
          tCtx.strokeStyle = '#555'; tCtx.strokeRect(p.x - p.w/2, p.y - p.h/2, p.w, p.h);
        }
      });
      tCtx.globalAlpha = 1.0;
    }

    function openTemplateGallery() {
      document.getElementById('tpl-modal').style.display = 'flex';
    }

    function closeTemplateGallery() {
      document.getElementById('tpl-modal').style.display = 'none';
    }

    async function importEditableTemplate(input) {
      const file = input.files && input.files[0];
      if (!file) return;

      try {
        const html = await file.text();
        const parsed = new DOMParser().parseFromString(html, 'text/html');
        const embeddedProject = getEmbeddedProjectData(parsed);
        if (!embeddedProject) {
          toast('⚠️ No editable project data found in this HTML.');
          input.value = '';
          return;
        }

        const restored = await restoreProjectFromData(embeddedProject, { toastMessage: '✅ Editable HTML loaded into editor.' });
        if (!restored) toast('⚠️ Could not load editable project.');
      } catch (err) {
        console.error('Failed to import editable HTML', err);
        toast('⚠️ Failed to import editable HTML.');
      }

      input.value = '';
    }

    function downloadEditableTemplate() {
      const project = exportProjectState();
      const source = document.documentElement.outerHTML;
      const payload = JSON.stringify(project);
      const scriptTag = `<script id="${EDITABLE_TEMPLATE_SCRIPT_ID}" type="application/json">${payload}<\/script>`;
      const cleaned = source.replace(new RegExp(`<script id="${EDITABLE_TEMPLATE_SCRIPT_ID}" type="application/json">[\\s\\S]*?<\\/script>`), '');
      const html = cleaned.replace('</body>', `  ${scriptTag}\n</body>`);
      const blob = new Blob([html], { type: 'text/html' });
      const a = document.createElement('a');
      a.href = URL.createObjectURL(blob);
      a.download = `TuitionStudio_Editable_${Date.now()}.html`;
      a.click();
      toast('💾 Editable HTML template downloaded.');
    }

    function toast(msg) {
      const t = document.getElementById('toast');
      t.innerText = msg; t.classList.add('show');
      setTimeout(() => t.classList.remove('show'), 2500);
    }

    function initCanvas() {
      const ratio = document.getElementById('canvas-ratio').value;
      W = RATIOS[ratio][0]; H = RATIOS[ratio][1];

      canvas.width = W * dpr; canvas.height = H * dpr;

      // Fit canvas visually in the center area
      const scale = Math.min((window.innerWidth - 650) / W, (window.innerHeight - 100) / H);
      wrap.style.width = `${W * scale}px`;
      wrap.style.height = `${H * scale}px`;
      panOffsetX = 0; panOffsetY = 0;
      wrap.style.transform = `translate(0px, 0px)`;

      updateUI();
    }

    window.onresize = () => {
      const scale = Math.min((window.innerWidth - 650) / W, (window.innerHeight - 100) / H);
      wrap.style.width = `${W * scale}px`;
      wrap.style.height = `${H * scale}px`;
    };

    /* ─── PRE-BUILT TUITION TEMPLATES ─── */
    function loadTemplate(style) {
      if (!TEMPLATE_PARTICLES[style]) {
        toast(`⚠️ Template "${style}" breakdown not found.`);
        return;
      }
      
      const data = TEMPLATE_PARTICLES[style];
      toast(`✨ Loading ${data.name}...`);
      
      // Reset state
      layers = [];
      layerIdCount = 1;

      // Change ratio if specified
      const targetRatio = data.ratio || '1:1';
      document.getElementById('canvas-ratio').value = targetRatio;
      const ratioParts = RATIOS[targetRatio] || [1080, 1080];
      W = ratioParts[0]; H = ratioParts[1];
      canvas.width = W * dpr; canvas.height = H * dpr;

      // Add particles as editable layers
      data.particles.forEach(p => {
        layers.push(createLayerRecord(p));
      });

      // Set the visual scale
      const scale = Math.min((window.innerWidth - 650) / W, (window.innerHeight - 100) / H);
      wrap.style.width = `${W * scale}px`;
      wrap.style.height = `${H * scale}px`;
      panOffsetX = 0; panOffsetY = 0;
      wrap.style.transform = `translate(0px, 0px)`;

      // Select a relevant frame if exists
      const tFrame = layers.find(l => l.name && (l.name.includes('Teacher') || l.name.includes('Frame') || l.name.includes('Photo')));
      selectedId = tFrame ? tFrame.id : (layers.length > 1 ? layers[1].id : layers[0].id);

      updateUI();
    }

    /* ─── LAYER CREATION (MANUAL) ─── */
    function addLayer(type, fileInput = null) {
      const cx = W / 2; const cy = H / 2;

      if (type === 'text') {
        layers.push(createLayerRecord({ type: 'text', name: 'Text Layer', text: 'නව පෙළ', x: cx, y: cy, font: "'Noto Sans Sinhala'", size: 80, color: '#ffffff', color2: '#ffaa00', color3: '#ff0055', weight: 800, align: 'center', rotation: 0, opacity: 100, style: 'solid', strokeW: 0, strokeC: '#000000', spacing: 0, bend: 0, effectPower: 50, effectDepth: 12, gAngle: 90 }));
      }
      else if (type === 'shape') {
        layers.push(createLayerRecord({ type: 'shape', name: 'Shape / Frame', sType: 'rect', x: cx, y: cy, w: 300, h: 300, color: '#444444', color2: '#222222', color3: '#000000', gType: 'none', gAngle: 0, opacity: 100, rotation: 0, brightness: 100, contrast: 100, saturation: 100, grayscale: 0, blur: 0, sharpen: 0, chromaKey: false, chromaColor: '#00ff00', chromaTolerance: 30, bevel: false, flipH: false, flipV: false, clipImg: null, clipX: 0, clipY: 0, clipScale: 100, clipRotation: 0, strokeW: 0, strokeC: '#ffffff', radius: 20 }));
      }
      else if (type === 'image' && fileInput && fileInput.files[0]) {
        const r = new FileReader();
        r.onload = e => {
          const img = new Image();
          img.onload = () => {
            let sc = 1; if (img.width > W * 0.8) sc = (W * 0.8) / img.width;
            layers.push(createLayerRecord({ type: 'image', name: 'Image', img: img, x: cx, y: cy, w: img.width * sc, h: img.height * sc, rotation: 0, opacity: 100, brightness: 100, contrast: 100, saturation: 100, grayscale: 0, blur: 0, sharpen: 0, chromaKey: false, chromaColor: '#00ff00', chromaTolerance: 30, flipH: false, flipV: false, maintainAspect: true }));
            selectedId = layerIdCount - 1; updateUI();
          };
          img.src = e.target.result;
        };
        r.readAsDataURL(fileInput.files[0]);
        fileInput.value = ''; return;
      }

      selectedId = layerIdCount - 1;
      updateUI();
    }

    /* ─── LAYER OPERATIONS ─── */
    function deleteLayer(id) {
      if (layers.find(x => x.id === id).type === 'bg') return;
      layers = layers.filter(x => x.id !== id);
      if (selectedId === id) selectedId = layers[0].id;
      updateUI();
    }

    function moveLayer(id, dir) {
      const idx = layers.findIndex(x => x.id === id);
      if (idx <= 0) return; // Cant move BG
      if (dir === 'up' && idx < layers.length - 1) {
        [layers[idx], layers[idx + 1]] = [layers[idx + 1], layers[idx]];
      } else if (dir === 'down' && idx > 1) {
        [layers[idx], layers[idx - 1]] = [layers[idx - 1], layers[idx]];
      }
      updateUI();
    }

    function duplicateLayer(id) {
      const l = layers.find(x => x.id === id);
      if (!l || l.type === 'bg') return;
      const clone = JSON.parse(JSON.stringify(l));
      clone.id = layerIdCount++; clone.name += ' Copy'; clone.x += 40; clone.y += 40;
      if (l.type === 'image') clone.img = l.img;
      if (l.type === 'shape') clone.clipImg = l.clipImg;

      const idx = layers.findIndex(x => x.id === id);
      layers.splice(idx + 1, 0, clone);
      selectedId = clone.id; updateUI();
    }

    /* ─── PROPERTIES UPDATES ─── */
    function updateProp(id, prop, val, isNum = true, event = null) {
      const l = layers.find(x => x.id === id);
      if (l) { 
        l[prop] = isNum ? Number(val) : val; 
        
        if (prop === 'sType') {
          if ((val === 'rect' || val === 'triangle' || val === 'ribbon') && (!l.h || l.h === 0)) {
             l.h = l.w; 
          }
          l.name = val.charAt(0).toUpperCase() + val.slice(1);
          renderLayerPanel();
          renderProps();
        }

        renderCanvas(); 
        
        const target = event?.target || window.event?.target;
        if (target && target.previousElementSibling && target.previousElementSibling.querySelector('.val-display')) {
          const display = target.previousElementSibling.querySelector('.val-display');
          if (prop === 'rotation' || prop === 'angle' || prop === 'gAngle' || prop === 'clipRotation') display.innerText = val + '°';
          else if (prop === 'opacity' || prop === 'brightness' || prop === 'contrast' || prop === 'saturation' || prop === 'grayscale' || prop === 'clipScale') display.innerText = val + '%';
          else if (prop === 'blur') display.innerText = val + 'px';
          else if (prop === 'bend') display.innerText = val + '°';
          else if (prop === 'sharpen') display.innerText = val + '%';
          else if (prop === 'chromaTolerance') display.innerText = val;
          else display.innerText = val;
        }
      }
    }
    function updateToggle(id, prop) {
      const l = layers.find(x => x.id === id);
      if (l) { l[prop] = !l[prop]; renderCanvas(); renderProps(); }
    }
    function updateTextContent(id, text) {
      const l = layers.find(x => x.id === id);
      if (l) { l.text = text; renderCanvas(); renderLayerPanel(); }
    }

    /* ─── CLIPPING MASK (TEACHER PHOTO ENGINE) ─── */
    function loadClipImage(id, input) {
      if (!input.files[0]) return;
      const l = layers.find(x => x.id === id);
      if (!l || l.type !== 'shape') return;

      const r = new FileReader();
      r.onload = e => {
        const img = new Image();
        img.onload = () => {
          l.clipImg = img;
          l.color = '#ffffff'; // White BG behind image
          updateUI();
          toast('✅ Teacher Photo Clipped Successfully!');
        };
        img.src = e.target.result;
      };
      r.readAsDataURL(input.files[0]);
      input.value = '';
    }
    function removeClip(id) {
      const l = layers.find(x => x.id === id);
      if (l) { l.clipImg = null; updateUI(); }
    }

    /* ─── UI RENDERING ─── */
    function updateUI() {
      renderLayerPanel();
      renderProps();
      renderCanvas();
    }

    function renderLayerPanel() {
      const list = document.getElementById('layer-list');
      list.innerHTML = '';
      // Reverse loop so top Z-index appears at the top of the panel (Photoshop style)
      [...layers].reverse().forEach(l => {
        let icon = l.type === 'bg' ? '🎨' : l.type === 'text' ? 'T' : l.type === 'shape' ? '⬛' : '🖼️';
        let isBg = l.type === 'bg';
        let dragAttrs = !isBg ? `draggable="true" ondragstart="layerDragStart(event, ${l.id})" ondragover="layerDragOver(event)" ondragleave="layerDragLeave(event)" ondrop="layerDrop(event, ${l.id})" ondragend="layerDragEnd(event)"` : '';
        let html = `
    <div class="layer-item ${selectedId === l.id ? 'active' : ''} ${isBg ? 'bg-layer' : ''}" onclick="selectedId=${l.id}; updateUI();" ${dragAttrs}>
      <div class="layer-name">
        <span class="layer-icon" style="opacity: ${l.hidden ? 0.3 : 1}" onclick="event.stopPropagation(); toggleVisibility(${l.id})">${l.hidden ? '👁️‍🗨️' : '👁️'}</span>
        <span class="layer-icon">${icon}</span> 
        <span style="${l.locked ? 'text-decoration: line-through' : ''}">${l.name}</span>
      </div>
      <div class="layer-actions">`;
        if (l.type !== 'bg') {
          html += `
        <button class="icon-btn" onclick="event.stopPropagation(); toggleLock(${l.id})" title="${l.locked ? 'Unlock' : 'Lock'}">${l.locked ? '🔒' : '🔓'}</button>
        <button class="icon-btn" onclick="event.stopPropagation(); moveLayer(${l.id}, 'up')" title="Move Forward">▲</button>
        <button class="icon-btn" onclick="event.stopPropagation(); moveLayer(${l.id}, 'down')" title="Move Backward">▼</button>
        <button class="icon-btn" onclick="event.stopPropagation(); duplicateLayer(${l.id})" title="Duplicate">⧉</button>
        <button class="icon-btn" style="color:var(--accent)" onclick="event.stopPropagation(); deleteLayer(${l.id})" title="Delete">✕</button>`;
        }
        html += `</div></div>`;
        list.insertAdjacentHTML('beforeend', html);
      });
    }

    /* --- LAYER DRAG AND DROP --- */
    let draggedLayerId = null;

    function layerDragStart(e, id) {
      draggedLayerId = id;
      e.dataTransfer.effectAllowed = 'move';
      e.dataTransfer.setData('text/plain', id);
      setTimeout(() => e.target.classList.add('dragging'), 0);
    }

    function layerDragOver(e) {
      e.preventDefault();
      e.dataTransfer.dropEffect = 'move';
      const item = e.target.closest('.layer-item');
      if (item && !item.classList.contains('bg-layer')) {
        item.classList.add('drag-over');
      }
    }
    
    function layerDragLeave(e) {
      const item = e.target.closest('.layer-item');
      if (item) item.classList.remove('drag-over');
    }

    function layerDrop(e, targetId) {
      e.preventDefault();
      const item = e.target.closest('.layer-item');
      if (item) item.classList.remove('drag-over');
      
      document.querySelectorAll('.layer-item').forEach(el => el.classList.remove('dragging'));

      if (!draggedLayerId || draggedLayerId === targetId) return;

      const fromIndex = layers.findIndex(l => l.id === draggedLayerId);
      const toIndex = layers.findIndex(l => l.id === targetId);

      if (fromIndex < 0 || toIndex < 0) return;
      if (layers[fromIndex].type === 'bg' || layers[toIndex].type === 'bg') return; // Protect background layer

      const [draggedLayer] = layers.splice(fromIndex, 1);
      
      const finalToIndex = layers.findIndex(l => l.id === targetId);
      layers.splice(finalToIndex, 0, draggedLayer);

      updateUI();
    }
    
    function layerDragEnd(e) {
      e.target.classList.remove('dragging');
      document.querySelectorAll('.layer-item').forEach(el => {
        el.classList.remove('drag-over');
        el.classList.remove('dragging');
      });
      draggedLayerId = null;
    }

      const l = layers.find(x => x.id === id);
      if (l) { l.hidden = !l.hidden; renderCanvas(); renderLayerPanel(); }

            <label class="prop-label">Enable Chroma Key
              <input type="checkbox" ${l.chromaKey ? 'checked' : ''} onchange="updateToggle(${l.id}, 'chromaKey')">
            </label>
          </div>
        </div>
        ${l.chromaKey ? `
        <div class="prop-row">
          <div class="prop-col"><label class="prop-label">Key Color</label><input type="color" value="${l.chromaColor || '#00ff00'}" onchange="updateProp(${l.id}, 'chromaColor', this.value, false, event)"></div>
          <div class="prop-col"><label class="prop-label">Tolerance <span class="val-display">${l.chromaTolerance || 30}</span></label><input type="range" min="1" max="100" value="${l.chromaTolerance || 30}" oninput="updateProp(${l.id}, 'chromaTolerance', this.value, true, event)"></div>
        </div>` : ''}
      </div>
    </div>`;
      }

      // --- HTML OVERLAY PROPS ---
      else if (l.type === 'html') {
        html += `
    <div class="prop-section">
      <div class="prop-title">Template Overlay Sizing</div>
      <div class="prop-row">
        <div class="prop-col"><label class="prop-label">Width <span class="val-display">${l.w}</span></label><input type="range" min="10" max="2000" value="${l.w}" oninput="updateProp(${l.id}, 'w', this.value, true, event)"></div>
        <div class="prop-col"><label class="prop-label">Height <span class="val-display">${l.h}</span></label><input type="range" min="10" max="2000" value="${l.h}" oninput="updateProp(${l.id}, 'h', this.value, true, event)"></div>
      </div>
    </div>`;
      }

      panel.innerHTML = html;
    }

    /* ─── INTERACTIVE MOUSE ENGINE (HIT TEST & DRAG) ─── */
    function setupMouseEvents() {
      wrap.addEventListener('mousedown', (e) => {
        if (currentTool === 'hand') {
          isPanning = true;
          panStartX = e.clientX;
          panStartY = e.clientY;
          wrap.style.cursor = 'grabbing';
          return;
        }

        if (layers.length === 0) return;

        const rect = wrap.getBoundingClientRect();
        const scaleX = W / rect.width;
        const scaleY = H / rect.height;
        const mx = (e.clientX - rect.left) * scaleX;
        const my = (e.clientY - rect.top) * scaleY;

        // Hit test reverse (top layer first)
        let clickedId = null;

        function isHit(l, mx, my) {
          if (l.hidden) return false;
          const rad = -(l.rotation * Math.PI / 180);
          const dx = mx - l.x; const dy = my - l.y;
          const lx = dx * Math.cos(rad) - dy * Math.sin(rad);
          const ly = dx * Math.sin(rad) + dy * Math.cos(rad);

          let bw = l.w || 0; let bh = l.h || 0;
          let left = -bw / 2; let top = -bh / 2;

          if (l.type === 'text') {
            ctx.font = `${l.weight} ${l.size}px ${l.font}`;
            const lines = l.text.split('\n');
            let maxW = 0;
            lines.forEach(line => {
              const m = measureTextRun(line, l.spacing);
              if (m > maxW) maxW = m;
            });
            bw = maxW;
            bh = lines.length * (l.size * 1.15);
            const align = l.align || 'center';
            left = -bw / 2;
            if (align === 'left') left = 0;
            if (align === 'right') left = -bw;
            top = -bh / 2;
            if (l.bend && l.bend !== 0) { bh += Math.abs(l.bend) * 2; top = -bh / 2; }
          } else if (l.type === 'shape' && l.sType === 'line') {
            bh = 20; top = -10;
          } else {
            if (l.type === 'shape' && l.sType !== 'rect' && l.sType !== 'triangle' && l.sType !== 'ribbon') bh = l.w;
            top = -bh / 2;
          }
          return (lx >= left && lx <= left + bw && ly >= top && ly <= top + bh);
        }

        // Priority 1: Check if click is inside the CURRENTLY SELECTED layer's bounding box
        if (selectedId && selectedId !== layers[0].id) {
          const selLayer = layers.find(x => x.id === selectedId);
          if (selLayer && !selLayer.hidden && !selLayer.locked) {
            const rad = -(selLayer.rotation * Math.PI / 180);
            const dx = mx - selLayer.x; const dy = my - selLayer.y;
            const lx = dx * Math.cos(rad) - dy * Math.sin(rad);
            const ly = dx * Math.sin(rad) + dy * Math.cos(rad);

            let bw = selLayer.w; let bh = selLayer.h;
            if (selLayer.type === 'text') {
              ctx.font = `${selLayer.weight} ${selLayer.size}px ${selLayer.font}`;
              const lines = selLayer.text.split('\n');
              let maxW = 0; lines.forEach(line => { const m = measureTextRun(line, selLayer.spacing); if (m > maxW) maxW = m; });
              bw = maxW; bh = lines.length * (selLayer.size * 1.15);
              if (selLayer.bend && selLayer.bend !== 0) bh += Math.abs(selLayer.bend) * 2;
            } else if (selLayer.type === 'shape' && selLayer.sType === 'line') {
              bh = 20;
            } else {
              if (selLayer.type === 'shape' && selLayer.sType !== 'rect' && selLayer.sType !== 'triangle' && selLayer.sType !== 'ribbon') bh = selLayer.w;
            }

            const hSize = 12; // handle hit radius
            const handles = [
              { id: 0, x: -bw/2, y: -bh/2 },
              { id: 1, x: bw/2, y: -bh/2 },
              { id: 2, x: bw/2, y: bh/2 },
              { id: 3, x: -bw/2, y: bh/2 }
            ];

            let handleHit = null;
            for (let h of handles) {
               if (Math.abs(lx - h.x) <= hSize && Math.abs(ly - h.y) <= hSize) {
                  handleHit = h.id; break;
               }
            }

            if (handleHit !== null) {
               isScaling = true;
               scaleCorner = handleHit;
               originalW = bw;
               originalH = bh;
               originalSize = selLayer.size || 0;
               return; // Scale instead of drag
            }

            if (isHit(selLayer, mx, my)) clickedId = selLayer.id;
          }
        }

        // Priority 2: If no hit on selected layer, check all layers top-to-bottom
        if (!clickedId) {
          for (let i = layers.length - 1; i >= 1; i--) {
            if (isHit(layers[i], mx, my)) {
              clickedId = layers[i].id;
              break;
            }
          }
        }

        if (clickedId) {
          const l = layers.find(x => x.id === clickedId);
          selectedId = clickedId;
          if (l.locked) {
             toast('🔒 Layer is Locked');
             isDragging = false;
          } else {
             if (e.altKey) { // Alt-Drag to duplicate
                const newId = layerIdCount++;
                const newLayer = JSON.parse(JSON.stringify(l));
                newLayer.id = newId;
                newLayer.name = newLayer.name + ' Copy';
                const idx = layers.findIndex(x => x.id === l.id);
                layers.splice(idx + 1, 0, newLayer);
                
                selectedId = newId;
                dragOffsetX = mx - newLayer.x;
                dragOffsetY = my - newLayer.y;
                isDragging = true;
                toast('Layer Duplicated');
             } else {
                dragOffsetX = mx - l.x;
                dragOffsetY = my - l.y;
                isDragging = true;
             }
          }
          updateUI();
        } else {
          selectedId = layers[0].id; // BG
          isDragging = false;
          updateUI();
        }
      });

      window.addEventListener('mousemove', (e) => {
        if (isPanning) {
          const dx = e.clientX - panStartX;
          const dy = e.clientY - panStartY;
          panOffsetX += dx;
          panOffsetY += dy;
          wrap.style.transform = `translate(${panOffsetX}px, ${panOffsetY}px)`;
          panStartX = e.clientX;
          panStartY = e.clientY;
          return;
        }
        
        if (!isDragging && !isScaling) return;
        if (selectedId === layers[0].id) return;
        const l = layers.find(x => x.id === selectedId);
        if (!l || l.locked) return;
        
        const rect = wrap.getBoundingClientRect();
        const scaleX = W / rect.width;
        const scaleY = H / rect.height;
        const mx = (e.clientX - rect.left) * scaleX;
        const my = (e.clientY - rect.top) * scaleY;

        if (isDragging) {
           let newX = mx - dragOffsetX;
           let newY = my - dragOffsetY;
           
           snapLines = [];
           if (Math.abs(newX - W/2) < 15) { newX = W/2; snapLines.push({x: W/2}); }
           if (Math.abs(newY - H/2) < 15) { newY = H/2; snapLines.push({y: H/2}); }
           
           l.x = newX;
           l.y = newY;
        } else if (isScaling) {
           const rad = -(l.rotation * Math.PI / 180);
           const dx = mx - l.x; const dy = my - l.y;
           const lx = dx * Math.cos(rad) - dy * Math.sin(rad);
           const ly = dx * Math.sin(rad) + dy * Math.cos(rad);
           
           const scale = Math.max(Math.abs(lx) / (originalW/2 || 1), Math.abs(ly) / (originalH/2 || 1));
           if (l.type === 'text') {
              l.size = Math.max(10, Math.round(originalSize * scale));
           } else {
              l.w = Math.max(10, Math.round(originalW * scale));
              if (l.h) l.h = Math.max(10, Math.round(originalH * scale));
           }
        }
        renderCanvas();
      });

      window.addEventListener('mouseup', () => {
        if (isPanning) {
          isPanning = false;
          wrap.style.cursor = currentTool === 'hand' ? 'grab' : 'default';
        }
        if (isDragging) {
          isDragging = false;
          snapLines = [];
          renderProps(); // Sync sliders
          renderCanvas(); // Remove snap lines visually
        }
        if (isScaling) {
          isScaling = false;
          renderProps();
        }
      });

      window.addEventListener('keydown', (e) => {
         if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;
         if (!selectedId || selectedId === layers[0].id) return;
         
         const l = layers.find(x => x.id === selectedId);
         if (!l || l.locked) return;
         
         const step = e.shiftKey ? 10 : 1;
         
         if (e.key === 'ArrowUp') { l.y -= step; e.preventDefault(); updateUI(); }
         if (e.key === 'ArrowDown') { l.y += step; e.preventDefault(); updateUI(); }
         if (e.key === 'ArrowLeft') { l.x -= step; e.preventDefault(); updateUI(); }
         if (e.key === 'ArrowRight') { l.x += step; e.preventDefault(); updateUI(); }
         
         if (e.key === 'Backspace' || e.key === 'Delete') {
            const idx = layers.findIndex(x => x.id === selectedId);
            if (idx > 0) {
               layers.splice(idx, 1);
               selectedId = layers[0].id;
               updateUI();
               toast('Layer Deleted');
            }
         }
      });
    }

    function centerLayer(id, axis) {
      const l = layers.find(x => x.id === id);
      if (!l || l.locked) return;
      if (axis === 'h') l.x = W / 2;
      if (axis === 'v') l.y = H / 2;
      updateUI();
    }

    /* ─── CORE RENDERING ENGINE ─── */
    function hexToRgba(hex, alpha) {
      if (!hex) return 'rgba(0,0,0,0)';
      let r = 0, g = 0, b = 0;
      if (hex.length === 4) { r = parseInt(hex[1] + hex[1], 16); g = parseInt(hex[2] + hex[2], 16); b = parseInt(hex[3] + hex[3], 16); }
      else if (hex.length === 7) { r = parseInt(hex.substr(1, 2), 16); g = parseInt(hex.substr(3, 2), 16); b = parseInt(hex.substr(5, 2), 16); }
      return `rgba(${r},${g},${b},${alpha / 100})`;
    }

    function renderCanvas() {
      if (layers.length === 0) return; // Safeguard

      ctx.save();
      ctx.scale(dpr, dpr);
      ctx.clearRect(0, 0, W, H);

      // Background
      const bg = layers[0];
      ctx.fillStyle = createThreeStopGradient(W, H, bg.c1, bg.c2, bg.c3 || bg.c2, bg.angle || 0, bg.bgMode || 'linear');
      ctx.fillRect(0, 0, W, H);

      // Helper for pixel-level processing
      function applyPixelFX(img, l, w, h) {
        const tempCanvas = document.createElement('canvas');
        tempCanvas.width = w; tempCanvas.height = h;
        const tctx = tempCanvas.getContext('2d');
        tctx.clearRect(0, 0, w, h);
        tctx.drawImage(img, 0, 0, w, h);
        
        let imageData = tctx.getImageData(0, 0, w, h);
        let pixels = imageData.data;

        // 1. Improved Chroma Key
        if (l.chromaKey) {
          const target = hexToRgb(l.chromaColor || '#00ff00');
          const tol = (l.chromaTolerance || 30) * 1.5;
          for (let i = 0; i < pixels.length; i += 4) {
            const r = pixels[i], g = pixels[i+1], b = pixels[i+2];
            
            // Calculate color distance
            const dR = r - target.r;
            const dG = g - target.g;
            const dB = b - target.b;
            const dist = Math.sqrt(dR*dR + dG*dG + dB*dB);
            
            if (dist < tol) {
              pixels[i+3] = 0; // Transparent
            } else if (dist < tol * 1.5) {
              // Soft edge / smoothing
              pixels[i+3] = pixels[i+3] * ((dist - tol) / (tol * 0.5));
            }
          }
        }

        // 2. Sharpening (Convolution)
        if (l.sharpen > 0) {
          const strength = l.sharpen / 100;
          const original = new Uint8ClampedArray(pixels);
          const weights = [0, -strength, 0, -strength, 1 + 4*strength, -strength, 0, -strength, 0];
          for (let y = 1; y < h - 1; y++) {
            for (let x = 1; x < w - 1; x++) {
              for (let c = 0; c < 3; c++) {
                let sum = 0;
                for (let ky = -1; ky <= 1; ky++) {
                  for (let kx = -1; kx <= 1; kx++) {
                    sum += original[((y+ky)*w + (x+kx))*4 + c] * weights[(ky+1)*3 + (kx+1)];
                  }
                }
                pixels[(y*w + x)*4 + c] = Math.min(255, Math.max(0, sum));
              }
            }
          }
        }
        
        tctx.putImageData(imageData, 0, 0);
        return tempCanvas;
      }

      function hexToRgb(hex) {
        let r = 0, g = 0, b = 0;
        if (hex.length === 4) { r = parseInt(hex[1]+hex[1], 16); g = parseInt(hex[2]+hex[2], 16); b = parseInt(hex[3]+hex[3], 16); }
        else { r = parseInt(hex.substr(1,2), 16); g = parseInt(hex.substr(3,2), 16); b = parseInt(hex.substr(5,2), 16); }
        return {r, g, b};
      }

      function splitIntoClusters(text) {
        if (window.Intl && typeof Intl.Segmenter === 'function') {
          return [...new Intl.Segmenter('si', { granularity: 'grapheme' }).segment(text)].map(part => part.segment);
        }
        return text.match(/\P{Mark}\p{Mark}*|./gu) || [];
      }

      function measureTextRun(text, spacing = 0) {
        const clusters = splitIntoClusters(text);
        return clusters.reduce((total, cluster, index) => {
          const extraSpacing = index < clusters.length - 1 ? spacing : 0;
          return total + ctx.measureText(cluster).width + extraSpacing;
        }, 0);
      }

      function createThreeStopGradient(width, height, color1, color2, color3, angleDeg, mode = 'linear', relativeX = 0, relativeY = 0) {
        const angleRad = (angleDeg || 0) * Math.PI / 180;
        if (mode === 'radial') {
          const radius = Math.max(width, height) * 0.8;
          const g = ctx.createRadialGradient(relativeX, relativeY, 0, relativeX, relativeY, radius);
          g.addColorStop(0, color1);
          g.addColorStop(0.55, color2);
          g.addColorStop(1, color3 || color2);
          return g;
        }

        const halfW = width / 2;
        const halfH = height / 2;
        const x1 = relativeX - Math.cos(angleRad) * halfW;
        const y1 = relativeY - Math.sin(angleRad) * halfH;
        const x2 = relativeX + Math.cos(angleRad) * halfW;
        const y2 = relativeY + Math.sin(angleRad) * halfH;
        
        const g = ctx.createLinearGradient(x1, y1, x2, y2);
        g.addColorStop(0, color1);
        g.addColorStop(0.5, color2);
        g.addColorStop(1, color3 || color2);
        return g;
      }

      function getTextGradient(text, x, y, l) {
        const width = Math.max(10, measureTextRun(text, l.spacing));
        let relX = x;
        const align = l.align || 'center';
        if (align === 'center') relX = x;
        else if (align === 'left') relX = x + width / 2;
        else if (align === 'right') relX = x - width / 2;
        
        return createThreeStopGradient(width, l.size, l.color, l.color2 || l.color, l.color3 || l.color2 || l.color, l.gAngle || 0, 'linear', relX, y);
      }

      // Render Layers Loop (Bottom to Top)
      for (let i = 1; i < layers.length; i++) {
        const l = layers[i];
        if (l.hidden) continue;
        ctx.save();

        ctx.translate(l.x, l.y);
        ctx.rotate(l.rotation * Math.PI / 180);
        
        // --- FLIP LOGIC ---
        let scaleX = 1, scaleY = 1;
        if (l.flipH) scaleX = -1;
        if (l.flipV) scaleY = -1;
        if (scaleX !== 1 || scaleY !== 1) ctx.scale(scaleX, scaleY);

        ctx.globalAlpha = l.opacity / 100;
        if (l.blendMode) ctx.globalCompositeOperation = l.blendMode;
        else ctx.globalCompositeOperation = 'source-over';
        
        if (l.dsOpacity && l.dsOpacity > 0) {
           ctx.shadowColor = hexToRgba(l.dsColor || '#000000', l.dsOpacity);
           ctx.shadowOffsetX = l.dsX || 0;
           ctx.shadowOffsetY = l.dsY || 0;
           ctx.shadowBlur = l.dsBlur || 0;
        }

        /* --- HTML TEMPLATE LAYER (OVERLAY) --- */
        if (l.type === 'html') {
          ctx.fillStyle = 'rgba(0, 200, 255, 0.2)';
          ctx.fillRect(-l.w / 2, -l.h / 2, l.w, l.h);
          ctx.strokeStyle = '#00c8ff';
          ctx.lineWidth = 2;
          ctx.strokeRect(-l.w / 2, -l.h / 2, l.w, l.h);
          ctx.fillStyle = '#fff';
          ctx.font = 'bold 20px Inter';
          ctx.textAlign = 'center';
          ctx.fillText(`HTML TEMPLATE: ${l.src}`, 0, 0);
          ctx.font = '12px Inter';
          ctx.fillText('This template will render fully in Website Export', 0, 30);
        }

        /* --- IMAGE LAYER --- */
        if (l.type === 'image') {
          // Apply Retouching Filters
          const filters = [];
          if (l.brightness !== undefined && l.brightness !== 100) filters.push(`brightness(${l.brightness}%)`);
          if (l.contrast !== undefined && l.contrast !== 100) filters.push(`contrast(${l.contrast}%)`);
          if (l.saturation !== undefined && l.saturation !== 100) filters.push(`saturate(${l.saturation}%)`);
          if (l.grayscale !== undefined && l.grayscale > 0) filters.push(`grayscale(${l.grayscale}%)`);
          if (l.blur !== undefined && l.blur > 0) filters.push(`blur(${l.blur}px)`);
          
          if (filters.length > 0) ctx.filter = filters.join(' ');
          else ctx.filter = 'none';

          if (l.chromaKey || l.sharpen > 0) {
            const fxCanvas = applyPixelFX(l.img, l, l.img.width, l.img.height);
            ctx.drawImage(fxCanvas, -l.w / 2, -l.h / 2, l.w, l.h);
          } else {
            ctx.drawImage(l.img, -l.w / 2, -l.h / 2, l.w, l.h);
          }
          ctx.filter = 'none'; // Reset after drawing
        }

        /* --- SHAPE / TEACHER PHOTO FRAME --- */
        else if (l.type === 'shape') {
          ctx.beginPath();
          if (l.sType === 'rect') {
            const r = l.radius || 0;
            const sx = -l.w / 2; const sy = -l.h / 2;
            ctx.moveTo(sx + r, sy); ctx.lineTo(sx + l.w - r, sy);
            ctx.quadraticCurveTo(sx + l.w, sy, sx + l.w, sy + r); ctx.lineTo(sx + l.w, sy + l.h - r);
            ctx.quadraticCurveTo(sx + l.w, sy + l.h, sx + l.w - r, sy + l.h); ctx.lineTo(sx + r, sy + l.h);
            ctx.quadraticCurveTo(sx, sy + l.h, sx, sy + l.h - r); ctx.lineTo(sx, sy + r);
            ctx.quadraticCurveTo(sx, sy, sx + r, sy);
          } else if (l.sType === 'circle') {
            ctx.arc(0, 0, l.w / 2, 0, Math.PI * 2);
          } else if (l.sType === 'triangle') {
            ctx.moveTo(0, -l.h / 2);
            ctx.lineTo(l.w / 2, l.h / 2);
            ctx.lineTo(-l.w / 2, l.h / 2);
          } else if (l.sType === 'star') {
            const spikes = 5; const outerRadius = l.w / 2; const innerRadius = l.w / 4;
            let rot = Math.PI / 2 * 3; let x = 0; let y = 0; const step = Math.PI / spikes;
            ctx.moveTo(0, -outerRadius);
            for (let j = 0; j < spikes; j++) {
              x = Math.cos(rot) * outerRadius; y = Math.sin(rot) * outerRadius; ctx.lineTo(x, y); rot += step;
              x = Math.cos(rot) * innerRadius; y = Math.sin(rot) * innerRadius; ctx.lineTo(x, y); rot += step;
            }
          } else if (l.sType === 'polygon') {
            const sides = 6; const r = l.w / 2;
            ctx.moveTo(r * Math.cos(-Math.PI / 2), r * Math.sin(-Math.PI / 2));
            for (let j = 1; j < sides; j++) {
              const ang = (j * 2 * Math.PI / sides) - Math.PI / 2;
              ctx.lineTo(r * Math.cos(ang), r * Math.sin(ang));
            }
          } else if (l.sType === 'badge') {
            const spikes = 16; const outer = l.w / 2; const inner = l.w / 2.2;
            ctx.moveTo(outer, 0);
            for (let j = 1; j < spikes * 2; j++) {
              const r = j % 2 === 0 ? outer : inner;
              const ang = j * Math.PI / spikes;
              ctx.lineTo(r * Math.cos(ang), r * Math.sin(ang));
            }
          } else if (l.sType === 'ribbon') {
            const hw = l.w / 2; const hh = l.h / 2;
            const bend = l.w * 0.1;
            ctx.moveTo(-hw, -hh); 
            ctx.lineTo(hw, -hh); 
            ctx.lineTo(hw - bend, 0); 
            ctx.lineTo(hw, hh); 
            ctx.lineTo(-hw, hh); 
            ctx.lineTo(-hw + bend, 0);
          } else if (l.sType === 'line') {
            ctx.moveTo(-l.w / 2, 0);
            ctx.lineTo(l.w / 2, 0);
          }
          ctx.closePath();

          if (l.clipImg) {
            // Clipping Mask Logic (Photo inside Shape)
            ctx.save();
            ctx.clip();
            
            // Apply Retouching Filters to Clipped Image
            const filters = [];
            if (l.brightness !== undefined && l.brightness !== 100) filters.push(`brightness(${l.brightness}%)`);
            if (l.contrast !== undefined && l.contrast !== 100) filters.push(`contrast(${l.contrast}%)`);
            if (l.saturation !== undefined && l.saturation !== 100) filters.push(`saturate(${l.saturation}%)`);
            if (l.grayscale !== undefined && l.grayscale > 0) filters.push(`grayscale(${l.grayscale}%)`);
            if (l.blur !== undefined && l.blur > 0) filters.push(`blur(${l.blur}px)`);
            
            if (filters.length > 0) ctx.filter = filters.join(' ');
            else ctx.filter = 'none';

            const imgRatio = l.clipImg.width / l.clipImg.height;
            const boxRatio = l.sType === 'rect' ? (l.w / l.h) : 1;
            let cw = l.w, ch = l.h;
            if (imgRatio > boxRatio) { cw = ch * imgRatio; } else { ch = cw / imgRatio; }
            
            // Apply Manual Manipulation (Offset, Scale, Rotation)
            const finalScale = (l.clipScale || 100) / 100;
            ctx.translate(l.clipX || 0, l.clipY || 0);
            ctx.rotate((l.clipRotation || 0) * Math.PI / 180);
            
            if (l.chromaKey || l.sharpen > 0) {
              const fxCanvas = applyPixelFX(l.clipImg, l, l.clipImg.width, l.clipImg.height);
              ctx.drawImage(fxCanvas, (-cw / 2) * finalScale, (-ch / 2) * finalScale, cw * finalScale, ch * finalScale);
            } else {
              ctx.drawImage(l.clipImg, (-cw / 2) * finalScale, (-ch / 2) * finalScale, cw * finalScale, ch * finalScale);
            }
            
            ctx.filter = 'none'; // Reset filter
            ctx.restore();
          }
          else {
            // Shape Fill Logic
            const sh = (l.sType === 'rect' || l.sType === 'triangle' || l.sType === 'ribbon') ? l.h : l.w;
            if (l.gType === 'linear') {
              ctx.fillStyle = createThreeStopGradient(l.w, sh, l.color, l.color2 || l.color, l.color3 || l.color2 || l.color, l.gAngle || 0, 'linear', 0, 0);
            } else if (l.gType === 'radial') {
              ctx.fillStyle = createThreeStopGradient(l.w, sh, l.color, l.color2 || l.color, l.color3 || l.color2 || l.color, l.gAngle || 0, 'radial', 0, 0);
            } else if (l.gType === 'gold') {
              const g = ctx.createLinearGradient(-l.w / 2, -sh / 2, l.w / 2, sh / 2);
              g.addColorStop(0, '#bf953f'); g.addColorStop(0.2, '#fcf6ba'); g.addColorStop(0.5, '#b38728'); g.addColorStop(0.8, '#fcf6ba'); g.addColorStop(1, '#aa8029');
              ctx.fillStyle = g;
            } else if (l.gType === 'silver') {
              const g = ctx.createLinearGradient(-l.w / 2, -sh / 2, l.w / 2, sh / 2);
              g.addColorStop(0, '#777'); g.addColorStop(0.5, '#eee'); g.addColorStop(1, '#777');
              ctx.fillStyle = g;
            } else if (l.gType === 'glass') {
              ctx.fillStyle = 'rgba(255,255,255,0.1)';
              ctx.shadowColor = 'rgba(255,255,255,0.2)'; ctx.shadowBlur = 10;
            } else {
              ctx.fillStyle = l.color;
            }
            ctx.fill();
            ctx.shadowBlur = 0; // Reset shadow

            // Bevel & Emboss Effect
            if (l.bevel) {
              ctx.save();
              ctx.clip();
              // Highlight
              ctx.strokeStyle = 'rgba(255,255,255,0.5)'; ctx.lineWidth = 10;
              ctx.shadowColor = 'rgba(255,255,255,0.8)'; ctx.shadowBlur = 15;
              ctx.strokeRect(-l.w / 2 - 5, -sh / 2 - 5, l.w + 10, sh + 10);
              // Shadow
              ctx.strokeStyle = 'rgba(0,0,0,0.5)'; ctx.lineWidth = 10;
              ctx.shadowColor = 'rgba(0,0,0,0.8)'; ctx.shadowBlur = 15;
              ctx.strokeRect(-l.w / 2 + 5, -sh / 2 + 5, l.w + 10, sh + 10);
              ctx.restore();
            }
          }

          // Border / Stroke
          if (l.strokeW > 0) {
            ctx.lineWidth = l.strokeW;
            ctx.strokeStyle = l.strokeC || '#ffffff';
            ctx.stroke();
          }
        }

        /* --- TEXT LAYER --- */
        else if (l.type === 'text') {
          const lines = l.text.split('\n');
          const lh = l.size * 1.15;
          const totalH = (lines.length - 1) * lh;

          const align = l.align || 'center';
          ctx.textAlign = align; ctx.textBaseline = 'middle';
          ctx.font = `${l.weight} ${l.size}px ${l.font}, sans-serif`;
          if (ctx.letterSpacing !== undefined) ctx.letterSpacing = l.spacing + "px";

          lines.forEach((line, li) => {
            const ly = -(totalH / 2) + (li * lh);

            if (l.bend && l.bend !== 0) {
              const clusters = splitIntoClusters(line);
              const clusterWidths = clusters.map((cluster, index) => ctx.measureText(cluster).width + (index < clusters.length - 1 ? l.spacing : 0));
              const totalWidth = clusterWidths.reduce((sum, width) => sum + width, 0);
              const bendStrength = Math.max(0.08, Math.abs(l.bend) / 180);
              const radius = Math.max(totalWidth / (Math.PI * bendStrength), l.size * 1.4);
              const totalAngle = totalWidth / radius;
              const curveDirection = l.bend >= 0 ? 1 : -1;

              let currentAngle = -totalAngle / 2;
              if (align === 'left') currentAngle = 0;
              if (align === 'right') currentAngle = -totalAngle;

              clusters.forEach((cluster, index) => {
                const clusterAngle = clusterWidths[index] / radius;
                const centerAngle = currentAngle + clusterAngle / 2;
                ctx.save();
                const tx = Math.sin(centerAngle) * radius;
                const ty = curveDirection * (radius - Math.cos(centerAngle) * radius);
                ctx.translate(tx, ly + ty);
                ctx.rotate(curveDirection > 0 ? centerAngle : -centerAngle);
                drawTextChar(cluster, 0, 0, l);
                ctx.restore();

                currentAngle += clusterAngle;
              });
            } else {
              // --- NORMAL STRAIGHT TEXT ---
              drawTextChar(line, 0, ly, l);
            }
          });
        }

        ctx.restore();

        // Selection Bounding Box Overlay
        if (selectedId === l.id) {
          ctx.save();
          ctx.translate(l.x, l.y);
          ctx.rotate(l.rotation * Math.PI / 180);
          ctx.strokeStyle = '#0d99ff'; ctx.lineWidth = 2;

          let bw = 0, bh = 0;
          const sh = (l.sType === 'rect' || l.sType === 'triangle' || l.sType === 'ribbon' || l.sType === 'line') ? (l.h || l.w) : l.w;
          if (l.type === 'shape' || l.type === 'image' || l.type === 'html') { 
            bw = l.w; 
            bh = (l.type === 'shape' && l.sType === 'line') ? 20 : sh; 
          }
          else if (l.type === 'text') {
            ctx.font = `${l.weight} ${l.size}px ${l.font}`;
            const lines = l.text.split('\n');
            bw = Math.max(...lines.map(x => measureTextRun(x, l.spacing)));
            bh = lines.length * (l.size * 1.15);
            if (l.bend && l.bend !== 0) bh += Math.abs(l.bend) * 2; // Extra height for bent text
          }

          let bx = -bw / 2;
          if (l.type === 'text') {
            const align = l.align || 'center';
            if (align === 'left') bx = 0;
            if (align === 'right') bx = -bw;
          }

          ctx.strokeRect(bx - 5, -bh / 2 - 5, bw + 10, bh + 10);
          // Nodes
          ctx.fillStyle = '#fff'; 
          const nodes = [
            [bx - 5, -bh / 2 - 5],
            [bx + bw + 5, -bh / 2 - 5],
            [bx - 5, bh / 2 + 5],
            [bx + bw + 5, bh / 2 + 5]
          ];
          nodes.forEach(n => {
            ctx.beginPath(); ctx.arc(n[0], n[1], 4, 0, Math.PI * 2); ctx.fill(); ctx.stroke();
          });
          ctx.restore();
        }
      }

      // Draw Smart Guides (Snapping)
      if ((isDragging || isScaling) && snapLines.length > 0) {
         ctx.save();
         ctx.strokeStyle = '#ff00ff'; // Magenta
         ctx.lineWidth = 1;
         ctx.setLineDash([5, 5]);
         snapLines.forEach(line => {
            ctx.beginPath();
            if (line.x !== undefined) {
               ctx.moveTo(line.x, 0); ctx.lineTo(line.x, H);
            } else if (line.y !== undefined) {
               ctx.moveTo(0, line.y); ctx.lineTo(W, line.y);
            }
            ctx.stroke();
         });
         ctx.restore();
      }

      ctx.restore();
    }

    function drawTextChar(line, x, ly, l) {
      const effectPower = (l.effectPower ?? 50) / 100;
      const effectDepth = l.effectDepth ?? 12;

      // Outline Stroke (Drawn behind)
      if (l.strokeW > 0) {
        ctx.lineJoin = 'round'; ctx.lineWidth = l.strokeW; ctx.strokeStyle = l.strokeC;
        ctx.strokeText(line, x, ly);
      }

      // Fill Colors
      if (l.style === '3dgold') {
        const depth = Math.max(1, Math.round(Math.min(24, effectDepth)));
        for (let j = depth; j >= 1; j--) {
          ctx.fillStyle = '#664200';
          ctx.fillText(line, x, ly + j * (0.6 + effectPower));
        }
        const grad = createThreeStopGradient(l.size, l.size, '#fff6cc', '#f5d06e', '#8b5e1a', 90, 'linear', x, ly);
        ctx.fillStyle = grad; ctx.fillText(line, x, ly);
      } else if (l.style === '3dcolor') {
        const grad = getTextGradient(line, x, ly, l);
        const depth = Math.max(1, Math.round(Math.min(30, effectDepth)));
        for (let j = depth; j >= 1; j--) {
          ctx.fillStyle = hexToRgba(l.strokeC || '#000000', 18 + effectPower * 35);
          ctx.fillText(line, x + j * 0.4, ly + j * (0.5 + effectPower));
        }
        ctx.fillStyle = grad;
        ctx.fillText(line, x, ly);
      } else if (l.style === 'cyber') {
        ctx.shadowColor = '#ff00ff'; ctx.shadowBlur = 8 + effectPower * 24;
        ctx.strokeStyle = '#00ffff'; ctx.lineWidth = 2; ctx.strokeText(line, x + 2, ly + 2);
        ctx.fillStyle = '#ffffff'; ctx.fillText(line, x, ly);
      } else if (l.style === 'royal') {
        const grad = createThreeStopGradient(l.size, l.size, '#6a1b9a', '#ffd700', '#4a148c', 90, 'linear', x, ly);
        ctx.fillStyle = grad; ctx.fillText(line, x, ly);
        ctx.shadowColor = 'rgba(0,0,0,0.5)'; ctx.shadowBlur = 5;
      } else if (l.style === 'forest') {
        const grad = createThreeStopGradient(l.size, l.size, '#2e7d32', '#a5d6a7', '#1b5e20', 90, 'linear', x, ly);
        ctx.fillStyle = grad; ctx.fillText(line, x, ly);
      } else if (l.style === 'sunset') {
        const grad = createThreeStopGradient(l.size, l.size, '#ff512f', '#dd2476', '#dd2476', 90, 'linear', x, ly);
        ctx.fillStyle = grad; ctx.fillText(line, x, ly);
      } else if (l.style === 'ocean') {
        const grad = createThreeStopGradient(l.size, l.size, '#2193b0', '#6dd5ed', '#6dd5ed', 90, 'linear', x, ly);
        ctx.fillStyle = grad; ctx.fillText(line, x, ly);
      } else if (l.style === 'metal') {
        const grad = createThreeStopGradient(l.size, l.size, '#777', '#eee', '#777', 90, 'linear', x, ly);
        ctx.fillStyle = grad; ctx.fillText(line, x, ly);
        ctx.strokeStyle = 'rgba(255,255,255,0.5)'; ctx.lineWidth = 1; ctx.strokeText(line, x, ly);
      } else if (l.style === 'matrix') {
        ctx.shadowColor = '#0f0'; ctx.shadowBlur = 10;
        ctx.fillStyle = '#000'; ctx.fillText(line, x, ly);
        ctx.fillStyle = '#0f0'; ctx.font = `bold ${l.size}px monospace`; ctx.fillText(line, x, ly);
        ctx.font = `${l.weight} ${l.size}px ${l.font}`;
      } else if (l.style === 'stamp') {
        ctx.fillStyle = l.color; ctx.globalAlpha = 0.8;
        ctx.fillText(line, x, ly);
        ctx.strokeStyle = l.color; ctx.lineWidth = 2; ctx.strokeText(line, x + 1, ly + 1);
        ctx.globalAlpha = 1.0;
      } else if (l.style === 'paper') {
        ctx.shadowColor = 'rgba(0,0,0,0.3)'; ctx.shadowBlur = 5; ctx.shadowOffsetX = 3; ctx.shadowOffsetY = 3;
        ctx.fillStyle = '#fff'; ctx.fillText(line, x, ly);
        ctx.shadowBlur = 0; ctx.shadowOffsetX = 0; ctx.shadowOffsetY = 0;
      } else if (l.style === 'longshadow') {
        const depth = Math.max(4, Math.round(effectDepth + effectPower * 20));
        for (let j = 1; j < depth; j++) {
          ctx.fillStyle = hexToRgba(l.color, Math.min(70, 10 + effectPower * 40));
          ctx.fillText(line, x + j, ly + j);
        }
        ctx.fillStyle = l.color; ctx.fillText(line, x, ly);
      } else if (l.style === 'bubble') {
        const grad = ctx.createRadialGradient(x, ly, 0, x, ly, l.size);
        grad.addColorStop(0, '#fff'); grad.addColorStop(0.5, l.color); grad.addColorStop(1, l.color);
        ctx.fillStyle = grad; ctx.fillText(line, x, ly);
      } else if (l.style === 'sketch') {
        ctx.strokeStyle = l.color; ctx.lineWidth = 1;
        ctx.strokeText(line, x + 1, ly + 1); ctx.strokeText(line, x - 1, ly - 1);
        ctx.fillStyle = 'transparent'; ctx.fillText(line, x, ly);
      } else if (l.style === 'chalk') {
        ctx.fillStyle = '#fff'; ctx.globalAlpha = 0.7;
        ctx.font = `italic ${l.size}px 'Comic Sans MS'`;
        ctx.fillText(line, x, ly);
        ctx.font = `${l.weight} ${l.size}px ${l.font}`;
        ctx.globalAlpha = 1.0;
      } else if (l.style === 'lava') {
        const grad = createThreeStopGradient(l.size, l.size, '#ff0', '#f60', '#300', 90, 'linear', x, ly);
        ctx.fillStyle = grad; ctx.fillText(line, x, ly);
        ctx.shadowColor = '#f30'; ctx.shadowBlur = 20;
      } else if (l.style === 'chrome') {
        const grad = createThreeStopGradient(l.size, l.size, '#444', '#fff', '#aaa', 90, 'linear', x, ly);
        ctx.fillStyle = grad; ctx.fillText(line, x, ly);
      } else if (l.style === 'retro') {
        ctx.fillStyle = '#ff00ff'; ctx.fillText(line, x + 4, ly + 4);
        ctx.fillStyle = '#00ffff'; ctx.fillText(line, x - 2, ly - 2);
        ctx.fillStyle = l.color; ctx.fillText(line, x, ly);
      } else if (l.style === 'hologram') {
        const width = measureTextRun(line, l.spacing);
        const grad = createThreeStopGradient(width, l.size, '#00ffff', '#ff00ff', '#00ffff', 0, 'linear', x, ly);
        ctx.globalAlpha = 0.6; ctx.fillStyle = grad; ctx.fillText(line, x + 2, ly);
        ctx.globalAlpha = 1.0; ctx.fillStyle = '#fff'; ctx.fillText(line, x, ly);
      } else if (l.style === 'comic') {
        ctx.strokeStyle = '#000'; ctx.lineWidth = 8; ctx.strokeText(line, x, ly);
        ctx.fillStyle = l.color; ctx.fillText(line, x, ly);
        ctx.fillStyle = '#fff'; ctx.globalAlpha = 0.3; ctx.fillText(line, x - 2, ly - 2); ctx.globalAlpha = 1.0;
      } else if (l.style === 'glass') {
        ctx.shadowColor = 'rgba(255,255,255,0.5)'; ctx.shadowBlur = 10;
        ctx.fillStyle = 'rgba(255,255,255,0.2)'; ctx.fillText(line, x, ly);
        ctx.strokeStyle = 'rgba(255,255,255,0.5)'; ctx.lineWidth = 1; ctx.strokeText(line, x, ly);
      } else if (l.style === 'electric') {
        ctx.shadowColor = '#0088ff'; ctx.shadowBlur = 12 + effectPower * 24;
        ctx.strokeStyle = '#fff'; ctx.lineWidth = 2; ctx.strokeText(line, x + Math.random() * 4, ly + Math.random() * 4);
        ctx.fillStyle = '#fff'; ctx.fillText(line, x, ly);
      } else if (l.style === 'wood') {
        const grad = createThreeStopGradient(l.size, l.size, '#8B4513', '#A0522D', '#8B4513', 90, 'linear', x, ly);
        ctx.fillStyle = grad; ctx.fillText(line, x, ly);
        ctx.strokeStyle = 'rgba(0,0,0,0.3)'; ctx.lineWidth = 1; ctx.strokeText(line, x, ly);
      } else if (l.style === 'stone') {
        ctx.fillStyle = '#666'; ctx.fillText(line, x + 2, ly + 2);
        ctx.fillStyle = '#aaa'; ctx.fillText(line, x, ly);
        ctx.strokeStyle = '#444'; ctx.lineWidth = 1; ctx.strokeText(line, x, ly);
      } else if (l.style === 'water') {
        ctx.shadowColor = '#00bbff'; ctx.shadowBlur = 15;
        const grad = createThreeStopGradient(l.size, l.size, 'rgba(255,255,255,0.8)', '#0099ff', '#004466', 90, 'linear', x, ly);
        ctx.fillStyle = grad; ctx.fillText(line, x, ly);
      } else if (l.style === 'neon') {
        ctx.shadowColor = l.color2 || l.color; ctx.shadowBlur = 16 + effectPower * 30; ctx.shadowOffsetX = 0; ctx.shadowOffsetY = 0;
        ctx.fillStyle = '#ffffff'; ctx.fillText(line, x, ly);
        ctx.shadowBlur = 8 + effectPower * 18; ctx.fillStyle = getTextGradient(line, x, ly, l); ctx.fillText(line, x, ly);
        ctx.shadowBlur = 0;
      } else if (l.style === 'plastic') {
        ctx.fillStyle = '#000000'; ctx.globalAlpha = 0.3; ctx.fillText(line, x + 2, ly + 2); ctx.globalAlpha = l.opacity / 100;
        const grad = createThreeStopGradient(l.size, l.size, '#ffffff', l.color, '#000000', 90, 'linear', x, ly);
        ctx.fillStyle = grad; ctx.fillText(line, x, ly);
      } else if (l.style === 'shadow') {
        ctx.shadowColor = 'rgba(0,0,0,0.5)'; ctx.shadowBlur = 10; ctx.shadowOffsetX = 4; ctx.shadowOffsetY = 4;
        ctx.fillStyle = l.color; ctx.fillText(line, x, ly);
        ctx.shadowBlur = 0; ctx.shadowOffsetX = 0; ctx.shadowOffsetY = 0;
      } else if (l.style === 'outline') {
        ctx.lineWidth = Math.max(4, l.size * 0.08); ctx.strokeStyle = '#000000'; ctx.lineJoin = 'round'; ctx.strokeText(line, x, ly);
        ctx.fillStyle = l.color; ctx.fillText(line, x, ly);
      } else if (l.style === 'gradient') {
        ctx.fillStyle = getTextGradient(line, x, ly, l); ctx.fillText(line, x, ly);
      } else if (l.style === 'fire') {
        ctx.shadowColor = '#ff4400'; ctx.shadowBlur = 20; ctx.fillStyle = '#ff6600'; ctx.fillText(line, x, ly);
        ctx.shadowBlur = 10; ctx.fillStyle = '#ffcc00'; ctx.fillText(line, x, ly);
        ctx.shadowBlur = 0; ctx.fillStyle = '#ffffff'; ctx.fillText(line, x, ly - 1);
      } else if (l.style === 'ice') {
        ctx.shadowColor = '#00ccff'; ctx.shadowBlur = 20; ctx.fillStyle = '#e0f7ff'; ctx.fillText(line, x, ly);
        ctx.shadowBlur = 0; ctx.strokeStyle = '#00aaff'; ctx.lineWidth = 2; ctx.strokeText(line, x, ly);
      } else if (l.style === 'rainbow') {
        const width = measureTextRun(line, l.spacing);
        const grad = createThreeStopGradient(width, l.size, l.color || '#ff0000', l.color2 || '#ffff00', l.color3 || '#0088ff', 0, 'linear', x, ly);
        ctx.fillStyle = grad; ctx.fillText(line, x, ly);
      } else {
        ctx.fillStyle = l.color;
        ctx.fillText(line, x, ly);
      }
    }

    /* ─── EXPORT & CLIPBOARD ─── */
    function copyToClipboard() {
      const prevId = selectedId; selectedId = null; renderCanvas(); // Hide box
      canvas.toBlob(async blob => {
        try {
          await navigator.clipboard.write([new ClipboardItem({ 'image/png': blob })]);
          toast('📋 Image Copied to Clipboard!');
        } catch (e) { toast('⚠️ Clipboard copy failed.'); }
        selectedId = prevId; renderCanvas();
      }, 'image/png');
    }

    function exportRender() {
      const prevId = selectedId; selectedId = null; renderCanvas(); // Hide box
      canvas.toBlob(blob => {
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = `Tuition_Poster_${W}x${H}.png`;
        a.click();
        toast('✅ HD Poster Downloaded!');
        selectedId = prevId; renderCanvas();
      }, 'image/png', 1.0);
    }

    function generateWebsite() {
      toast('🚀 Generating Production Website...');
      
      const bg = layers[0];
      let layersHtml = '';
      const bgCss = (bg.bgMode === 'radial')
        ? `radial-gradient(circle at center, ${bg.c1}, ${bg.c2}, ${bg.c3 || bg.c2})`
        : `linear-gradient(${bg.angle || 0}deg, ${bg.c1}, ${bg.c2}, ${bg.c3 || bg.c2})`;
      
      // Process layers from bottom to top
      layers.forEach((l, i) => {
        if (l.type === 'bg') return;
        
        let transforms = [`translate(-50%, -50%)`, `rotate(${l.rotation}deg)`];
        if (l.flipH || l.flipV) transforms.push(`scale(${l.flipH ? -1 : 1}, ${l.flipV ? -1 : 1})`);
        let style = `position: absolute; left: ${l.x}px; top: ${l.y}px; transform: ${transforms.join(' ')}; opacity: ${l.opacity / 100}; mix-blend-mode: ${l.blendMode || 'normal'}; z-index: ${i};`;
        
        // Add Retouching Filters to Style
        let filters = [];
        if (l.brightness !== undefined && l.brightness !== 100) filters.push(`brightness(${l.brightness}%)`);
        if (l.contrast !== undefined && l.contrast !== 100) filters.push(`contrast(${l.contrast}%)`);
        if (l.saturation !== undefined && l.saturation !== 100) filters.push(`saturate(${l.saturation}%)`);
        if (l.grayscale !== undefined && l.grayscale > 0) filters.push(`grayscale(${l.grayscale}%)`);
        if (l.blur !== undefined && l.blur > 0) filters.push(`blur(${l.blur}px)`);
        if (filters.length > 0) style += `filter: ${filters.join(' ')};`;

        if (l.type === 'text') {
          const textGradient = `linear-gradient(${l.gAngle || 0}deg, ${l.color}, ${l.color2 || l.color}, ${l.color3 || l.color2 || l.color})`;
          style += `font-family: ${l.font}; font-size: ${l.size}px; color: ${l.color}; font-weight: ${l.weight}; text-align: ${l.align}; letter-spacing: ${l.spacing}px; line-height: 1.15; white-space: pre-wrap; width: auto; transform-origin: center center;`;
          if (l.strokeW > 0) {
             style += `-webkit-text-stroke: ${l.strokeW}px ${l.strokeC};`;
          }
          if (l.style === 'gradient' || l.style === '3dcolor' || l.style === 'neon') {
            style += `background: ${textGradient}; -webkit-background-clip: text; background-clip: text; color: transparent;`;
          }
          if (l.style === 'neon') style += `text-shadow: 0 0 10px ${l.color2 || l.color}, 0 0 22px ${l.color3 || l.color};`;
          if (l.style === 'shadow') style += `text-shadow: 4px 4px 4px rgba(0,0,0,0.5);`;
          if (l.style === '3dcolor') style += `text-shadow: ${Math.max(1, l.effectDepth || 12)}px ${Math.max(1, l.effectDepth || 12)}px 0 ${l.strokeC || '#000000'};`;
          if (l.style === 'longshadow') style += `text-shadow: ${Math.max(2, l.effectDepth || 12)}px ${Math.max(2, l.effectDepth || 12)}px 0 ${l.color2 || l.strokeC || '#000000'};`;
          if (l.bend) style += `display:inline-block; transform: ${transforms.join(' ')} skewY(${Math.max(-12, Math.min(12, l.bend / 12))}deg);`;

          layersHtml += `<div style="${style}">${l.text.replace(/\n/g, '<br>')}</div>\n`;
        }
        else if (l.type === 'shape') {
          let borderRadius = l.sType === 'circle' ? '50%' : (l.radius || 0) + 'px';
          let clipPath = '';
          const sh = (l.sType === 'rect' || l.sType === 'triangle' || l.sType === 'ribbon') ? l.h : l.w;

          if (l.sType === 'triangle') {
            clipPath = 'polygon(50% 0%, 0% 100%, 100% 100%)';
          } else if (l.sType === 'star') {
            clipPath = 'polygon(50% 0%, 61% 35%, 98% 35%, 68% 57%, 79% 91%, 50% 70%, 21% 91%, 32% 57%, 2% 35%, 39% 35%)';
          } else if (l.sType === 'polygon') {
            clipPath = 'polygon(25% 0%, 75% 0%, 100% 50%, 75% 100%, 25% 100%, 0% 50%)';
          } else if (l.sType === 'badge') {

          } else if (l.sType === 'ribbon') {
             const b = (sh > 0) ? (l.w * 0.1 / l.w * 100) : 10;
             clipPath = `polygon(0% 0%, 100% 0%, ${100-b}% 50%, 100% 100%, 0% 100%, ${b}% 50%)`;
          }

          }

          }

          // Shape Gradients for Website
          if (l.gType === 'linear') {

          } else if (l.gType === 'radial') {
            style += `background: radial-gradient(circle, ${l.color}, ${l.color2 || l.color}, ${l.color3 || l.color2 || l.color});`;
          } else if (l.gType === 'gold') {
            style += `background: linear-gradient(45deg, #bf953f, #fcf6ba, #b38728, #fcf6ba, #aa8029);`;
          } else if (l.gType === 'silver') {

          }

          let content = '';

            }
            content = `<img src="${l.clipImg.src}" style="${imgStyle}">`;
          }
