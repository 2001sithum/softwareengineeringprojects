<!DOCTYPE html>
<html lang="si">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dynamic AI Prompter</title>
    <!-- Google Fonts for Sinhala -->
    <link href="https://fonts.googleapis.com/css2?family=Abhaya+Libre:wght@400;700&family=Noto+Sans+Sinhala:wght@400;700&family=Noto+Serif+Sinhala:wght@400;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg: #0a0a0a;
            --text: #ffffff;
            --accent: #00ff88;
            --font-main: 'Noto Sans Sinhala', sans-serif;
            --line-height: 1.6;
        }

        /* Themes */
        .theme-dark { --bg: #0a0a0a; --text: #ffffff; --accent: #00ff88; }
        .theme-light { --bg: #f5f5f5; --text: #111111; --accent: #007bff; }
        .theme-warm { --bg: #1a1510; --text: #ffcc99; --accent: #ffae00; }
        .theme-high-vis { --bg: #000000; --text: #ffff00; --accent: #ffffff; }

        body, html {
            margin: 0; padding: 0;
            background: var(--bg);
            color: var(--text);
            font-family: var(--font-main);
            height: 100%; overflow: hidden;
            transition: background 0.5s ease, color 0.5s ease;
        }

        /* --- SETUP SCREEN --- */
        #setup {
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            height: 100vh; padding: 20px; box-sizing: border-box; text-align: center;
        }

        textarea {
            width: 90%; max-width: 900px; height: 350px;
            background: rgba(255,255,255,0.05); color: #fff;
            border: 1px solid #444; border-radius: 15px; padding: 20px;
            font-size: 18px; font-family: inherit;
        }

        .controls-row {
            display: flex; gap: 20px; margin-top: 20px; flex-wrap: wrap; justify-content: center;
        }

        select, button {
            padding: 12px 25px; border-radius: 8px; border: none; font-size: 16px; cursor: pointer;
        }

        .btn-launch { background: var(--accent); color: #000; font-weight: bold; font-size: 20px; }

        /* --- PROMPTER ENGINE --- */
        #prompter { display: none; height: 100vh; width: 100%; position: relative; }

        #scroll-box {
            height: 100%; overflow: hidden;
            padding-top: 45vh; padding-bottom: 90vh;
        }

        #text-content {
            width: 80%; margin: 0 auto;
            font-size: 4rem; line-height: var(--line-height);
            text-align: center; font-weight: 700; white-space: pre-wrap;
        }

        /* Reading Guide */
        #guide {
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 90%; height: 1.5em; 
            background: rgba(128, 128, 128, 0.1);
            border-top: 2px solid var(--accent); border-bottom: 2px solid var(--accent);
            pointer-events: none; z-index: 10;
        }

        /* LIVE CONTROL PANEL (HUD) */
        #hud {
            position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
            background: rgba(0,0,0,0.8); backdrop-filter: blur(10px);
            padding: 15px 30px; border-radius: 50px;
            display: flex; gap: 25px; align-items: center;
            border: 1px solid rgba(255,255,255,0.1);
            z-index: 100; transition: opacity 0.3s; opacity: 0.2;
        }
        #hud:hover { opacity: 1; }

        .hud-group { display: flex; align-items: center; gap: 10px; font-family: sans-serif; font-size: 12px; color: #aaa; }
        input[type=range] { cursor: pointer; accent-color: var(--accent); }

        #countdown {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: var(--bg); display: none; align-items: center; justify-content: center;
            font-size: 200px; color: var(--accent); z-index: 200;
        }
    </style>
</head>
<body class="theme-dark">

    <!-- SETUP VIEW -->
    <div id="setup">
        <h1 style="color:var(--accent)">Dynamic Sinhala Prompter</h1>
        <textarea id="in-text">
සේවකයින් ශුන්‍යයක් සහිත සමාගමක් ඊළඟ දශකයේ වඩාත්ම වටිනා සමාගම බවට පත් වුවහොත්?

එක් මිනිහෙක්. AI එකක්. ඒ විතරයි.

OpenAI CEO සෑම් ඇල්ට්මන් මේ කිව්වේ 2023දී. 
දැන් data කතා කරනවා. හිනා නැහැ.

මේක අලුත් විප්ලවයක ආරම්භයයි.
        </textarea>

        <div class="controls-row">
            <select id="set-font">
                <option value="'Noto Sans Sinhala'">Modern Sans</option>
                <option value="'Noto Serif Sinhala'">Classic Serif</option>
                <option value="'Abhaya Libre'">Bold Abhaya</option>
                <option value="monospace">Mono Space</option>
            </select>

            <select id="set-theme">
                <option value="theme-dark">Midnight Dark</option>
                <option value="theme-light">Paper Light</option>
                <option value="theme-warm">Warm Coffee</option>
                <option value="theme-high-vis">High Visibility</option>
            </select>

            <button class="btn-launch" onclick="start()">LAUNCH SCRIPT</button>
        </div>
    </div>

    <!-- COUNTDOWN -->
    <div id="countdown">3</div>

    <!-- PROMPTER VIEW -->
    <div id="prompter">
        <div id="guide"></div>
        <div id="scroll-box">
            <div id="text-content"></div>
        </div>

        <!-- LIVE HUD -->
        <div id="hud">
            <div class="hud-group">
                SPEED <input type="range" id="speed-slider" min="0" max="20" step="0.5" value="3" oninput="updateSpeed(this.value)">
                <span id="speed-label">3</span>
            </div>
            <div class="hud-group">
                SIZE <input type="range" id="size-slider" min="1" max="10" step="0.1" value="4" oninput="updateSize(this.value)">
                <span id="size-label">4rem</span>
            </div>
            <button onclick="togglePause()" id="pause-btn" style="background:var(--accent); color:#000; padding:5px 15px; border-radius:4px; font-weight:bold;">PAUSE</button>
            <button onclick="location.reload()" style="background:#444; color:#fff; padding:5px 15px; border-radius:4px;">EXIT</button>
        </div>
    </div>

    <script>
        let scrollY = 0;
        let speed = 3;
        let isPaused = true;
        let animationId;

        function start() {
            const text = document.getElementById('in-text').value;
            const font = document.getElementById('set-font').value;
            const theme = document.getElementById('set-theme').value;

            if(!text.trim()) return alert("Enter a script!");

            // Apply settings
            document.body.className = theme;
            document.body.style.setProperty('--font-main', font);
            document.getElementById('text-content').innerText = text;
            
            document.getElementById('setup').style.display = 'none';
            document.getElementById('countdown').style.display = 'flex';

            // Countdown Logic
            let c = 3;
            let timer = setInterval(() => {
                c--;
                if(c <= 0) {
                    clearInterval(timer);
                    document.getElementById('countdown').style.display = 'none';
                    document.getElementById('prompter').style.display = 'block';
                    isPaused = false;
                    run();
                } else {
                    document.getElementById('countdown').innerText = c;
                }
            }, 1000);
        }

        function run() {
            if (!isPaused) {
                scrollY += speed / 10;
                document.getElementById('scroll-box').scrollTop = scrollY;
            }
            animationId = requestAnimationFrame(run);
        }

        function updateSpeed(v) {
            speed = parseFloat(v);
            document.getElementById('speed-label').innerText = speed;
        }

        function updateSize(v) {
            document.getElementById('text-content').style.fontSize = v + 'rem';
            document.getElementById('size-label').innerText = v + 'rem';
        }

        function togglePause() {
            isPaused = !isPaused;
            document.getElementById('pause-btn').innerText = isPaused ? "PLAY" : "PAUSE";
        }

        // Global Keys
        window.addEventListener('keydown', (e) => {
            if(e.code === 'Space') { e.preventDefault(); togglePause(); }
            if(e.code === 'ArrowUp') { 
                speed += 0.5; 
                document.getElementById('speed-slider').value = speed;
                updateSpeed(speed);
            }
            if(e.code === 'ArrowDown') { 
                speed = Math.max(0, speed - 0.5); 
                document.getElementById('speed-slider').value = speed;
                updateSpeed(speed);
            }
        });
    </script>
</body>
</html>
