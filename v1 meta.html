  <script>// Playables SDK v1.0.0
    // Game lifecycle bridge: rAF-based game-ready detection + event communication
    (function () {

      // Idempotency: skip if already initialized (e.g., server-side injection
      // followed by client-side inject-javascript via the Bloks webview component).
      if (window.playablesSDK) return;

      var HANDLER_NAME = 'playablesGameEventHandler';
      var ANDROID_BRIDGE_NAME = '_MetaPlayablesBridge';
      var RAF_FRAME_THRESHOLD = 3;

      var gameReadySent = false;
      var firstInteractionSent = false;
      var errorSent = false;
      var frameCount = 0;
      var originalRAF = window.requestAnimationFrame;

      // --- Transport Layer ---

      function hasIOSBridge() {
        return !!(window.webkit &&
          window.webkit.messageHandlers &&
          window.webkit.messageHandlers[HANDLER_NAME]);
      }

      function hasAndroidBridge() {
        return !!(window[ANDROID_BRIDGE_NAME] &&
          typeof window[ANDROID_BRIDGE_NAME].postEvent === 'function');
      }

      function isInIframe() {
        return !!(window.parent && window.parent !== window);
      }

      function sendEvent(eventName, payload) {
        var message = {
          type: eventName,
          payload: payload || {},
          timestamp: Date.now()
        };

        if (hasIOSBridge()) {
          try {
            window.webkit.messageHandlers[HANDLER_NAME].postMessage(message);
          } catch (e) { /* ignore */ }
          return;
        }

        if (hasAndroidBridge()) {
          try {
            var p = payload || {};
            p.__secureToken = window.__fbAndroidBridgeAuthToken || '';
            window[ANDROID_BRIDGE_NAME].postEvent(
              eventName,
              JSON.stringify(p)
            );
          } catch (e) { /* ignore */ }
          return;
        }

        if (isInIframe()) {
          try {
            window.parent.postMessage(message, '*');
          } catch (e) { /* ignore */ }
          return;
        }
      }

      // --- rAF Game-Ready Detection ---

      function onFrame() {
        if (gameReadySent) return;

        frameCount++;
        if (frameCount >= RAF_FRAME_THRESHOLD) {
          gameReadySent = true;
          sendEvent('game_ready', {
            frame_count: frameCount,
            detected_at: Date.now()
          });
          return;
        }

        originalRAF.call(window, onFrame);
      }

      if (originalRAF) {
        window.requestAnimationFrame = function (callback) {
          if (!gameReadySent) {
            return originalRAF.call(window, function (timestamp) {
              frameCount++;
              if (frameCount >= RAF_FRAME_THRESHOLD && !gameReadySent) {
                gameReadySent = true;
                sendEvent('game_ready', {
                  frame_count: frameCount,
                  detected_at: Date.now()
                });
              }
              callback(timestamp);
            });
          }
          return originalRAF.call(window, callback);
        };
      }

      // --- First User Interaction Detection ---

      function setupFirstInteractionDetection() {
        var events = ['touchstart', 'mousedown', 'keydown'];

        function onFirstInteraction() {
          if (firstInteractionSent) return;
          firstInteractionSent = true;
          sendEvent('user_interaction_start', null);

          for (var i = 0; i < events.length; i++) {
            document.removeEventListener(events[i], onFirstInteraction, true);
          }
        }

        for (var i = 0; i < events.length; i++) {
          document.addEventListener(events[i], onFirstInteraction, true);
        }
      }

      if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', setupFirstInteractionDetection);
      } else {
        setupFirstInteractionDetection();
      }

      // --- Auto Error Capture ---

      window.addEventListener('error', function (event) {
        if (errorSent) return;
        errorSent = true;
        sendEvent('error', {
          message: event.message || 'Unknown error',
          source: event.filename || '',
          lineno: event.lineno || 0,
          colno: event.colno || 0,
          auto_captured: true

      });

        errorSent = true;
        var reason = event.reason;

          message: (reason instanceof Error) ? reason.message : String(reason),

          auto_captured: true

          sendEvent('game_ended', {
            score: score,
            completed: true
          });
        },

        error: function (message) {
          if (errorSent) return;
          errorSent = true;
          sendEvent('error', {
            message: message || 'Unknown error',
            auto_captured: false
          });
        },

        sendEvent: function (eventName, payload) {
          if (!eventName || typeof eventName !== 'string') return;
          sendEvent(eventName, payload);

  <link

  <style>
    /* ═════════ FIGMA-STYLE UI VARIABLES ═════════ */
    :root {
      --bg: #121212;
      --panel: #1e1e1e;
      --panel-border: #333333;
      --accent: #ff0055;
      --accent-hover: #ff3377;
      --text-main: #cccccc;
      --text-bright: #ffffff;
      --gold: #f5d06e;
      --layer-hover: #2a2d2e;
      --layer-selected: #4a1525;
      --font-ui: 'Inter', sans-serif;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      user-select: none;
    }

    body {
      background: var(--bg);
      color: var(--text-main);
      font-family: var(--font-ui);
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    ::-webkit-scrollbar {
      width: 6px;
      height: 6px;
    }

    ::-webkit-scrollbar-thumb {
      background: #555;
      border-radius: 4px;
    }

    ::-webkit-scrollbar-track {
      background: var(--panel);
    }

    /* ─── TOP BAR ─── */
    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 16px;
      height: 55px;
      background: #252526;
      border-bottom: 1px solid var(--panel-border);
      z-index: 100;
    }

    .logo {
      font-size: 16px;
      font-weight: 800;
      color: #fff;
      letter-spacing: 0.5px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .logo span {
      background: var(--accent);
      color: #fff;
      padding: 3px 8px;
      border-radius: 4px;
      font-size: 11px;
      text-transform: uppercase;
    }

    .top-actions {
      display: flex;
      gap: 10px;
      align-items: center;
    }

    .canvas-size-select {
      background: #111;
      color: #fff;
      border: 1px solid #555;
      padding: 8px;
      border-radius: 6px;
      font-size: 12px;
      outline: none;
      cursor: pointer;
    }

    .btn {
      padding: 8px 16px;
      border-radius: 6px;
      border: 1px solid transparent;
      font-family: var(--font-ui);
      font-size: 12px;
      cursor: pointer;
      transition: 0.2s;
      font-weight: 600;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .btn-outline {
      background: transparent;
      color: var(--text-bright);
      border-color: #555;
    }

    .btn-outline:hover {
      background: #444;
    }

    .btn-primary {
      background: var(--accent);
      color: #fff;
    }

    .btn-primary:hover {
      background: var(--accent-hover);
    }

    /* ─── WORKSPACE (3 COLUMNS) ─── */
    .workspace {
      display: flex;
      flex: 1;
      overflow: hidden;
    }

    /* 1. LEFT PANEL (LAYERS & TEMPLATES) */
    .left-panel {
      width: 300px;
      background: var(--panel);
      border-right: 1px solid var(--panel-border);
      display: flex;
      flex-direction: column;
    }

    .panel-header {
      padding: 12px 16px;
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      color: #999;
      border-bottom: 1px solid var(--panel-border);
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: #181818;
    }

    .layer-list {
      flex: 1;
      overflow-y: auto;
      padding: 8px 0;
    }

    .layer-item {
      padding: 10px 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      cursor: pointer;
      font-size: 13px;
      color: var(--text-main);
      border-left: 3px solid transparent;
      transition: 0.1s;
      border-bottom: 1px solid rgba(255, 255, 255, 0.02);
    }

    .layer-item:hover {
      background: var(--layer-hover);
    }

    .layer-item.active {
      background: var(--layer-selected);
      border-left-color: var(--accent);
      color: var(--text-bright);
    }

    .layer-name {
      display: flex;
      align-items: center;
      gap: 10px;
      flex: 1;
      overflow: hidden;
      white-space: nowrap;
      text-overflow: ellipsis;
      font-weight: 500;
    }

    .layer-icon {
      font-size: 14px;
      width: 16px;
      text-align: center;
    }

    .layer-actions {
      display: flex;
      gap: 4px;
      opacity: 0;
      transition: 0.2s;
    }

    .layer-item:hover .layer-actions,
    .layer-item.active .layer-actions {
      opacity: 1;
    }

    .icon-btn {
      background: #444;
      border: none;
      color: #ccc;
      cursor: pointer;
      font-size: 10px;
      width: 22px;
      height: 22px;
      border-radius: 4px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .icon-btn:hover {
      background: #666;
      color: #fff;
    }

    /* TUITION TEMPLATES SECTION */
    .add-tools {
      padding: 15px;
      border-top: 1px solid var(--panel-border);
      background: #1a1a1a;
    }

    .add-tools-title {
      font-size: 11px;
      color: #aaa;
      text-transform: uppercase;
      margin-bottom: 10px;
      font-weight: 700;
    }

    .add-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      margin-bottom: 10px;
    }

    .add-btn {
      background: #2d2d2d;
      color: #ddd;
      border: 1px solid #444;
      padding: 10px;
      font-size: 11px;
      cursor: pointer;
      border-radius: 6px;
      transition: 0.2s;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 5px;
      font-weight: 600;
      text-align: center;
    }

    .add-btn:hover {
      background: var(--accent);
      border-color: var(--accent);
      color: #fff;
    }

    .full-btn {
      grid-column: span 2;
      background: #0055ff;
      border-color: #0055ff;
      color: white;
    }

    .full-btn:hover {
      background: #0044cc;
    }

    /* 2. CENTER CANVAS AREA */
    .canvas-container {
      flex: 1;
      background: #0a0a0a;
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      background-image: radial-gradient(#333 1px, transparent 1px);
      background-size: 20px 20px;
    }

    #canvas-wrap {
      position: relative;
      box-shadow: 0 10px 50px rgba(0, 0, 0, 0.8);
      outline: 1px solid #444;
      cursor: grab;
      transition: width 0.3s, height 0.3s;
    }

    #canvas-wrap:active {
      cursor: grabbing;
    }

    canvas {
      display: block;
      width: 100%;
      height: 100%;
    }

    /* 3. RIGHT PANEL (PROPERTIES/INSPECTOR) */
    .right-panel {
      width: 320px;
      background: var(--panel);
      border-left: 1px solid var(--panel-border);
      display: flex;
      flex-direction: column;
      overflow-y: auto;
    }

    .prop-section {
      border-bottom: 1px solid var(--panel-border);
      padding: 16px;
    }

    .prop-title {
      font-size: 11px;
      font-weight: 700;
      color: #aaa;
      margin-bottom: 16px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      display: flex;
      justify-content: space-between;
    }

    .prop-row {
      display: flex;
      gap: 12px;
      margin-bottom: 12px;
      align-items: flex-end;
    }

    .prop-col {
      display: flex;
      flex-direction: column;
      flex: 1;
      min-width: 0;
    }

    .prop-label {
      font-size: 11px;
      color: #999;
      margin-bottom: 6px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    /* Forms */
    input[type=text],
    textarea,
    select {
      width: 100%;
      background: #121212;
      color: #fff;
      border: 1px solid #444;
      padding: 8px 10px;
      border-radius: 6px;
      font-family: 'Noto Sans Sinhala', sans-serif;
      font-size: 13px;
      outline: none;
      transition: 0.2s;
    }

    input[type=text]:focus,
    textarea:focus,
    select:focus {
      border-color: var(--accent);
      background: #1a1a1a;
    }

    textarea {
      resize: vertical;
      min-height: 60px;
      line-height: 1.5;
    }

    input[type=color] {
      -webkit-appearance: none;
      border: none;
      width: 100%;
      height: 32px;
      border-radius: 6px;
      cursor: pointer;
      background: transparent;
      padding: 0;
    }

    input[type=color]::-webkit-color-swatch-wrapper {
      padding: 0;
    }

    input[type=color]::-webkit-color-swatch {
      border: 1px solid #555;
      border-radius: 6px;
    }

    input[type=range] {
      -webkit-appearance: none;
      width: 100%;
      height: 4px;
      background: #444;
      outline: none;
      border-radius: 2px;
    }

    input[type=range]::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 14px;
      height: 14px;
      background: #fff;
      border-radius: 50%;
      cursor: pointer;
      border: 2px solid var(--accent);
    }

    /* File Upload Button */
    .clip-upload {
      border: 2px dashed var(--accent);
      background: rgba(255, 0, 85, 0.05);
      color: var(--accent);
      padding: 16px;
      text-align: center;
      border-radius: 6px;
      cursor: pointer;
      font-size: 13px;
      font-weight: 600;
      transition: 0.2s;
      display: flex;
      flex-direction: column;
      gap: 6px;
      align-items: center;
      margin-top: 10px;
    }

    .clip-upload:hover {
      background: rgba(255, 0, 85, 0.15);
      border-style: solid;
    }

    .clip-remove {
      border: 1px solid #ff4444;
      color: #ff4444;
      padding: 10px;
      text-align: center;
      border-radius: 6px;
      cursor: pointer;
      font-size: 12px;
      font-weight: 600;
      margin-top: 8px;
    }

    .clip-remove:hover {
      background: rgba(255, 68, 68, 0.1);
    }

    .empty-state {
      padding: 40px 20px;
      text-align: center;
      color: #666;
      font-size: 13px;
      line-height: 1.6;
    }

    /* TOAST */
    #toast {
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%) translateY(20px);
      background: #fff;
      color: #000;
      padding: 10px 20px;
      border-radius: 30px;
      font-weight: 600;
      font-size: 13px;
      z-index: 2000;
      opacity: 0;
      pointer-events: none;
      transition: 0.3s;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
    }

    #toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    /* ─── TEMPLATE GALLERY MODAL ─── */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.85);
      z-index: 5000;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .modal-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 20px;
      background: #1a1a1a;
      border-bottom: 2px solid var(--accent);
      flex-shrink: 0;
    }

    .modal-title {
      font-size: 15px;
      font-weight: 800;
      color: #fff;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .modal-close {
      background: #444;
      border: none;
      color: #fff;
      width: 34px;
      height: 34px;
      border-radius: 6px;
      font-size: 18px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .modal-close:hover {
      background: var(--accent);
    }

    .modal-body {
      flex: 1;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    .modal-grid-view {
      flex: 1;
      overflow-y: auto;
      padding: 16px;
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
      gap: 14px;
    }

    .tpl-card {
      background: #2a2a2a;
      border: 2px solid #444;
      border-radius: 10px;
      overflow: hidden;
      cursor: pointer;
      transition: 0.2s;
      display: flex;
      flex-direction: column;
    }

    .tpl-card:hover {
      border-color: var(--accent);
      transform: scale(1.03);
      box-shadow: 0 8px 24px rgba(255, 0, 85, 0.3);
    }

    .tpl-card-thumb {
      width: 100%;
      height: 120px;
      border: none;
      pointer-events: none;
      background: #fff;
      transform-origin: top left;
      overflow: hidden;
      position: relative;
    }

    .tpl-card-thumb iframe {
      width: 600px;
      height: 800px;
      border: none;
      transform: scale(0.3);
      transform-origin: top left;
      pointer-events: none;
      position: absolute;
      top: 0;
      left: 0;
    }

    .tpl-card-label {
      padding: 8px 10px;
      font-size: 11px;
      font-weight: 700;
      color: #ddd;
      text-align: center;
      background: #1e1e1e;
      border-top: 1px solid #333;
    }

    /* Preview pane */
    .modal-preview {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .modal-preview-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 18px;
      background: #222;
      border-bottom: 1px solid #333;
      flex-shrink: 0;
    }

    .modal-preview-title {
      font-size: 13px;
      font-weight: 700;
      color: #fff;
    }

    .modal-preview-actions {
      display: flex;
      gap: 8px;
    }

    .modal-preview-body {
      flex: 1;
      overflow: hidden;
      display: flex;
    }

    .modal-preview-body iframe {
      flex: 1;
      border: none;
      background: #fff;
    }

    .tpl-grid-btn {
      background: #2d2d2d;
      border: 1px solid #555;
      color: #ddd;
      padding: 7px 12px;
      border-radius: 6px;
      font-size: 12px;
      cursor: pointer;
      font-weight: 600;
    }

    .tpl-grid-btn:hover {
      background: #444;
    }

    .tpl-use-btn {
      background: var(--accent);
      border: 1px solid var(--accent);
      color: #fff;
      padding: 7px 16px;
      border-radius: 6px;
      font-size: 12px;
      cursor: pointer;
      font-weight: 700;
    }

    .tpl-use-btn:hover {
      background: var(--accent-hover);
    }
  </style>
</head>

    function populateTemplateGallery() {
      const grid = document.getElementById('tpl-grid-view');
      grid.innerHTML = '';
      templatesList.forEach(tpl => {
        const card = document.createElement('div');
        card.className = 'tpl-card';
        card.onclick = () => previewTemplate(tpl);
        card.innerHTML = `
          <div class="tpl-card-thumb">
            <iframe src="${tpl}" scrolling="no"></iframe>
          </div>
          <div class="tpl-card-label">${tpl.replace('.html', '').replace('template psalsss postshtml ', '')}</div>
        `;
        grid.appendChild(card);
      });
    }

    function previewTemplate(tpl) {
      document.getElementById('tpl-grid-view').style.display = 'none';
      document.getElementById('tpl-preview-view').style.display = 'flex';
      document.getElementById('tpl-preview-name').innerText = tpl;
      document.getElementById('tpl-preview-iframe').src = tpl;
    }

    function showTemplateGrid() {
      document.getElementById('tpl-grid-view').style.display = 'grid';
      document.getElementById('tpl-preview-view').style.display = 'none';
    }

    function openTemplateGallery() {
      document.getElementById('tpl-modal').style.display = 'flex';
    }

    function closeTemplateGallery() {
      document.getElementById('tpl-modal').style.display = 'none';
    }

    function importCurrentTemplateToCanvas() {
      const tpl = document.getElementById('tpl-preview-name').innerText;
      
      if (TEMPLATE_PARTICLES[tpl]) {
        loadTemplate(tpl);
        closeTemplateGallery();
      } else {
        toast(`Importing ${tpl}... Note: Standard Overlay Import.`);
        layers.push({
          id: layerIdCount++,
          type: 'html',
          name: 'Template Overlay',
          src: tpl,
          x: W / 2,
          y: H / 2,
          w: W,
          h: H,
          opacity: 50,
          rotation: 0,
          blendMode: 'normal'
        });
        selectedId = layerIdCount - 1;
        closeTemplateGallery();
        updateUI();
      }
    }

    function toast(msg) {
      const t = document.getElementById('toast');
      t.innerText = msg; t.classList.add('show');
      setTimeout(() => t.classList.remove('show'), 2500);
    }

    function initCanvas() {
      const ratio = document.getElementById('canvas-ratio').value;
      W = RATIOS[ratio][0]; H = RATIOS[ratio][1];

      canvas.width = W * dpr; canvas.height = H * dpr;

      // Fit canvas visually in the center area
      const scale = Math.min((window.innerWidth - 650) / W, (window.innerHeight - 100) / H);
      wrap.style.width = `${W * scale}px`;
      wrap.style.height = `${H * scale}px`;

      updateUI();
    }

    window.onresize = () => {
      const scale = Math.min((window.innerWidth - 650) / W, (window.innerHeight - 100) / H);
      wrap.style.width = `${W * scale}px`;
      wrap.style.height = `${H * scale}px`;
    };

    /* ─── PRE-BUILT TUITION TEMPLATES ─── */
    function loadTemplate(style) {
      if (!TEMPLATE_PARTICLES[style]) {
        toast(`⚠️ Template "${style}" breakdown not found.`);
        return;
      }
      
      const data = TEMPLATE_PARTICLES[style];
      toast(`✨ Loading ${data.name}...`);
      
      // Reset state
      layers = [];
      layerIdCount = 1;

      // Change ratio if specified
      const targetRatio = data.ratio || '1:1';
      document.getElementById('canvas-ratio').value = targetRatio;
      const ratioParts = RATIOS[targetRatio] || [1080, 1080];
      W = ratioParts[0]; H = ratioParts[1];
      canvas.width = W * dpr; canvas.height = H * dpr;

      // Add particles as editable layers
      data.particles.forEach(p => {
        const layer = {
          id: layerIdCount++,
          ...p,
          rotation: p.rotation || 0,
          opacity: p.opacity || 100,
          brightness: p.brightness || 100,
          contrast: p.contrast || 100,
          saturation: p.saturation || 100,
          grayscale: p.grayscale || 0,
          blur: p.blur || 0,
          color2: p.color2 || p.color || '#000000',
          color3: p.color3 || '#000000',
          gAngle: p.gAngle || 0,
          blendMode: p.blendMode || 'source-over',
          hidden: false,
          locked: false
        };
        layers.push(layer);
      });

      // Set the visual scale
      const scale = Math.min((window.innerWidth - 650) / W, (window.innerHeight - 100) / H);
      wrap.style.width = `${W * scale}px`;
      wrap.style.height = `${H * scale}px`;

      // Select a relevant frame if exists
      const tFrame = layers.find(l => l.name && (l.name.includes('Teacher') || l.name.includes('Frame') || l.name.includes('Photo')));
      selectedId = tFrame ? tFrame.id : (layers.length > 1 ? layers[1].id : layers[0].id);

      updateUI();
    }

            let sc = 1; if (img.width > W * 0.8) sc = (W * 0.8) / img.width;
            layers.push({ id: layerIdCount++, type: 'image', name: 'Image', img: img, x: cx, y: cy, w: img.width * sc, h: img.height * sc, rotation: 0, opacity: 100, brightness: 100, contrast: 100, saturation: 100, grayscale: 0, blur: 0 });
            selectedId = layerIdCount - 1; updateUI();
          };
          img.src = e.target.result;
        };
        r.readAsDataURL(fileInput.files[0]);
        fileInput.value = ''; return;
      }

      selectedId = layerIdCount - 1;
      updateUI();
    }

    /* ─── LAYER OPERATIONS ─── */
    function deleteLayer(id) {
      if (layers.find(x => x.id === id).type === 'bg') return;
      layers = layers.filter(x => x.id !== id);
      if (selectedId === id) selectedId = layers[0].id;
      updateUI();
    }

    function moveLayer(id, dir) {
      const idx = layers.findIndex(x => x.id === id);
      if (idx <= 0) return; // Cant move BG
      if (dir === 'up' && idx < layers.length - 1) {
        [layers[idx], layers[idx + 1]] = [layers[idx + 1], layers[idx]];
      } else if (dir === 'down' && idx > 1) {
        [layers[idx], layers[idx - 1]] = [layers[idx - 1], layers[idx]];
      }
      updateUI();
    }

    function duplicateLayer(id) {
      const l = layers.find(x => x.id === id);
      if (!l || l.type === 'bg') return;
      const clone = JSON.parse(JSON.stringify(l));
      clone.id = layerIdCount++; clone.name += ' Copy'; clone.x += 40; clone.y += 40;
      if (l.type === 'image') clone.img = l.img;
      if (l.type === 'shape') clone.clipImg = l.clipImg;

      const idx = layers.findIndex(x => x.id === id);
      layers.splice(idx + 1, 0, clone);
      selectedId = clone.id; updateUI();
    }

    /* ─── PROPERTIES UPDATES ─── */
    function updateProp(id, prop, val, isNum = true) {
      const l = layers.find(x => x.id === id);
      if (l) { 
        l[prop] = isNum ? Number(val) : val; 
        
        // Fix for shape height when switching types
        if (prop === 'sType') {
          if ((val === 'rect' || val === 'triangle' || val === 'ribbon') && (!l.h || l.h === 0)) {
             l.h = l.w; 
          }
          l.name = val.charAt(0).toUpperCase() + val.slice(1);
          renderLayerPanel();
          renderProps(); // Full re-render of props to show/hide height slider
        }

        renderCanvas(); 
        
        // Update label value in real-time without full re-render
        const target = event?.target;
        if (target && target.previousElementSibling && target.previousElementSibling.querySelector('.val-display')) {
          const display = target.previousElementSibling.querySelector('.val-display');
          if (prop === 'rotation' || prop === 'angle' || prop === 'gAngle') display.innerText = val + '°';
          else if (prop === 'opacity' || prop === 'brightness' || prop === 'contrast' || prop === 'saturation' || prop === 'grayscale') display.innerText = val + '%';
          else if (prop === 'blur') display.innerText = val + 'px';
          else display.innerText = val;
        }
      }
    }
    function updateTextContent(id, text) {
      const l = layers.find(x => x.id === id);
      if (l) { l.text = text; renderCanvas(); renderLayerPanel(); }
    }

    /* ─── CLIPPING MASK (TEACHER PHOTO ENGINE) ─── */
    function loadClipImage(id, input) {
      if (!input.files[0]) return;
      const l = layers.find(x => x.id === id);
      if (!l || l.type !== 'shape') return;

      const r = new FileReader();
      r.onload = e => {
        const img = new Image();
        img.onload = () => {
          l.clipImg = img;
          l.color = '#ffffff'; // White BG behind image
          updateUI();
          toast('✅ Teacher Photo Clipped Successfully!');
        };
        img.src = e.target.result;
      };
      r.readAsDataURL(input.files[0]);
      input.value = '';
    }
    function removeClip(id) {
      const l = layers.find(x => x.id === id);
      if (l) { l.clipImg = null; updateUI(); }
    }

        <span class="layer-icon">${icon}</span> 
        <span style="${l.locked ? 'text-decoration: line-through' : ''}">${l.name}</span>
      </div>
      <div class="layer-actions">`;

          <div class="prop-col"><label class="prop-label">Grayscale <span class="val-display">${l.grayscale || 0}%</span></label><input type="range" min="0" max="100" value="${l.grayscale || 0}" oninput="updateProp(${l.id}, 'grayscale', this.value)"></div>
        </div>
        <div class="prop-row">
          <div class="prop-col"><label class="prop-label">Blur <span class="val-display">${l.blur || 0}px</span></label><input type="range" min="0" max="20" value="${l.blur || 0}" oninput="updateProp(${l.id}, 'blur', this.value)"></div>
        </div>
      </div>

      <!-- CRITICAL TUITION FEATURE: PHOTO CLIPPING MASK -->
      <div style="margin-top:20px; padding-top:20px; border-top:1px solid #444">
        <div class="prop-title" style="color:var(--accent)">📸 Teacher Photo Frame</div>
        <div style="font-size:11px; color:#888; margin-bottom:10px; line-height:1.4">Upload a teacher's photo here. It will be perfectly cropped inside this shape.</div>
        ${l.clipImg ?
            `<div class="clip-remove" onclick="removeClip(${l.id})">🗑️ Remove Photo</div>` :
            `<input type="file" id="clip-file" accept="image/*" style="display:none" onchange="loadClipImage(${l.id}, this)">
           <div class="clip-upload" onclick="document.getElementById('clip-file').click()">
             <i style="font-size:24px; margin-bottom:4px">🖼️</i>
             Click to Upload Photo
           </div>`
          }
      </div>
    </div>`;
      }

      // --- IMAGE PROPS ---
      else if (l.type === 'image') {
        html += `
    <div class="prop-section">
      <div class="prop-title">Image Sizing</div>
      <div class="prop-row">
        <div class="prop-col"><label class="prop-label">Scale Width <span class="val-display">${Math.round(l.w)}</span></label><input type="range" min="10" max="3000" value="${l.w}" oninput="updateProp(${l.id}, 'w', this.value); l.h = l.img.height * (this.value/l.img.width); renderCanvas();"></div>
      </div>
      
      <!-- RETOUCHING / FILTERS -->
      <div style="margin-top:15px; border-top:1px solid #333; padding-top:15px;">
        <div class="prop-title">Image Retouching</div>
        <div class="prop-row">
          <div class="prop-col"><label class="prop-label">Brightness <span class="val-display">${l.brightness || 100}%</span></label><input type="range" min="0" max="200" value="${l.brightness || 100}" oninput="updateProp(${l.id}, 'brightness', this.value)"></div>
          <div class="prop-col"><label class="prop-label">Contrast <span class="val-display">${l.contrast || 100}%</span></label><input type="range" min="0" max="200" value="${l.contrast || 100}" oninput="updateProp(${l.id}, 'contrast', this.value)"></div>
        </div>
        <div class="prop-row">
          <div class="prop-col"><label class="prop-label">Saturation <span class="val-display">${l.saturation || 100}%</span></label><input type="range" min="0" max="200" value="${l.saturation || 100}" oninput="updateProp(${l.id}, 'saturation', this.value)"></div>
          <div class="prop-col"><label class="prop-label">Grayscale <span class="val-display">${l.grayscale || 0}%</span></label><input type="range" min="0" max="100" value="${l.grayscale || 0}" oninput="updateProp(${l.id}, 'grayscale', this.value)"></div>
        </div>
        <div class="prop-row">
          <div class="prop-col"><label class="prop-label">Blur <span class="val-display">${l.blur || 0}px</span></label><input type="range" min="0" max="20" value="${l.blur || 0}" oninput="updateProp(${l.id}, 'blur', this.value)"></div>
        </div>
      </div>
    </div>`;
      }

      // --- HTML OVERLAY PROPS ---
      else if (l.type === 'html') {
        html += `
    <div class="prop-section">
      <div class="prop-title">Template Overlay Sizing</div>
      <div class="prop-row">
        <div class="prop-col"><label class="prop-label">Width <span class="val-display">${l.w}</span></label><input type="range" min="10" max="2000" value="${l.w}" oninput="updateProp(${l.id}, 'w', this.value)"></div>
        <div class="prop-col"><label class="prop-label">Height <span class="val-display">${l.h}</span></label><input type="range" min="10" max="2000" value="${l.h}" oninput="updateProp(${l.id}, 'h', this.value)"></div>
      </div>

      }

      panel.innerHTML = html;
    }

    /* ─── INTERACTIVE MOUSE ENGINE (HIT TEST & DRAG) ─── */
    function setupMouseEvents() {
      wrap.addEventListener('mousedown', (e) => {
        if (layers.length === 0) return;

        const rect = wrap.getBoundingClientRect();
        const scaleX = W / rect.width;
        const scaleY = H / rect.height;
        const mx = (e.clientX - rect.left) * scaleX;
        const my = (e.clientY - rect.top) * scaleY;

        // Hit test reverse (top layer first)
        let clickedId = null;
        for (let i = layers.length - 1; i >= 1; i--) {
          const l = layers[i];
          if (l.hidden) continue;
          const rad = -(l.rotation * Math.PI / 180);
          const dx = mx - l.x; const dy = my - l.y;
          const lx = dx * Math.cos(rad) - dy * Math.sin(rad);
          const ly = dx * Math.sin(rad) + dy * Math.cos(rad);

          let hit = false;
          if (l.type === 'image' || (l.type === 'shape' && (l.sType === 'rect' || l.sType === 'triangle' || l.sType === 'star' || l.sType === 'polygon' || l.sType === 'badge' || l.sType === 'ribbon')) || l.type === 'html') {
            const hw = l.w / 2; const hh = (l.sType === 'rect' || l.sType === 'triangle' || l.sType === 'ribbon' || l.type === 'image' || l.type === 'html') ? l.h / 2 : l.w / 2;
            if (lx >= -hw && lx <= hw && ly >= -hh && ly <= hh) hit = true;
          }
          else if (l.type === 'shape' && l.sType === 'circle') {
            // Circle hit test
            if (lx * lx + ly * ly <= (l.w / 2) * (l.w / 2)) hit = true;
          }
          else if (l.type === 'shape' && l.sType === 'line') {
             if (Math.abs(ly) < 10 && Math.abs(lx) < l.w / 2) hit = true;
          }
          else if (l.type === 'text') {
            ctx.font = `${l.weight} ${l.size}px ${l.font}`;
            const lines = l.text.split('\n');
            let maxW = 0;
            lines.forEach(line => {
              const m = ctx.measureText(line).width + (line.length * l.spacing);
              if (m > maxW) maxW = m;
            });
            const th = lines.length * (l.size * 1.15);
            let left = -maxW / 2;
            if (l.align === 'left') left = 0;
            if (l.align === 'right') left = -maxW;

            if (lx >= left && lx <= left + maxW && ly >= -th / 2 && ly <= th / 2) hit = true;
          }

          if (hit) {
            clickedId = l.id;
            if (l.locked) {
               toast('🔒 Layer is Locked');
               isDragging = false;
            } else {
               dragOffsetX = mx - l.x;
               dragOffsetY = my - l.y;
               isDragging = true;
            }
            break;
          }
        }

        if (clickedId) {
          selectedId = clickedId;
          updateUI();
        } else {
          selectedId = layers[0].id; // BG
          isDragging = false;
          updateUI();
        }
      });

      window.addEventListener('mousemove', (e) => {
        if (!isDragging || selectedId === layers[0].id) return;
        const l = layers.find(x => x.id === selectedId);
        if (!l || l.locked) return;
        
        const rect = wrap.getBoundingClientRect();
        const scaleX = W / rect.width;
        const scaleY = H / rect.height;
        const mx = (e.clientX - rect.left) * scaleX;
        const my = (e.clientY - rect.top) * scaleY;

        l.x = mx - dragOffsetX;
        l.y = my - dragOffsetY;
        renderCanvas();
      });

      window.addEventListener('mouseup', () => {
        if (isDragging) {
          isDragging = false;
          renderProps(); // Sync sliders
        }
      });
    }

    /* ─── CORE RENDERING ENGINE ─── */
    function hexToRgba(hex, alpha) {
      if (!hex) return 'rgba(0,0,0,0)';
      let r = 0, g = 0, b = 0;
      if (hex.length === 4) { r = parseInt(hex[1] + hex[1], 16); g = parseInt(hex[2] + hex[2], 16); b = parseInt(hex[3] + hex[3], 16); }
      else if (hex.length === 7) { r = parseInt(hex.substr(1, 2), 16); g = parseInt(hex.substr(3, 2), 16); b = parseInt(hex.substr(5, 2), 16); }
      return `rgba(${r},${g},${b},${alpha / 100})`;
    }

    function renderCanvas() {
      if (layers.length === 0) return; // Safeguard

      ctx.save();
      ctx.scale(dpr, dpr);
      ctx.clearRect(0, 0, W, H);

      // Background
      const bg = layers[0];
      const angle = bg.angle * (Math.PI / 180);
      const x2 = W / 2 + Math.cos(angle) * W;
      const y2 = H / 2 + Math.sin(angle) * H;
      const grd = ctx.createLinearGradient(W / 2 - Math.cos(angle) * W, H / 2 - Math.sin(angle) * H, x2, y2);
      grd.addColorStop(0, bg.c1); grd.addColorStop(1, bg.c2);
      ctx.fillStyle = grd; ctx.fillRect(0, 0, W, H);

      // Render Layers Loop (Bottom to Top)
      for (let i = 1; i < layers.length; i++) {
        const l = layers[i];
        if (l.hidden) continue;
        ctx.save();

        ctx.translate(l.x, l.y);
        ctx.rotate(l.rotation * Math.PI / 180);
        ctx.globalAlpha = l.opacity / 100;
        if (l.blendMode) ctx.globalCompositeOperation = l.blendMode;
        else ctx.globalCompositeOperation = 'source-over';

        /* --- HTML TEMPLATE LAYER (OVERLAY) --- */
        if (l.type === 'html') {
          ctx.fillStyle = 'rgba(0, 200, 255, 0.2)';
          ctx.fillRect(-l.w / 2, -l.h / 2, l.w, l.h);
          ctx.strokeStyle = '#00c8ff';
          ctx.lineWidth = 2;
          ctx.strokeRect(-l.w / 2, -l.h / 2, l.w, l.h);
          ctx.fillStyle = '#fff';
          ctx.font = 'bold 20px Inter';
          ctx.textAlign = 'center';
          ctx.fillText(`HTML TEMPLATE: ${l.src}`, 0, 0);
          ctx.font = '12px Inter';
          ctx.fillText('This template will render fully in Website Export', 0, 30);
        }

        /* --- IMAGE LAYER --- */
        if (l.type === 'image') {
          // Apply Retouching Filters
          const filters = [];
          if (l.brightness !== undefined && l.brightness !== 100) filters.push(`brightness(${l.brightness}%)`);
          if (l.contrast !== undefined && l.contrast !== 100) filters.push(`contrast(${l.contrast}%)`);
          if (l.saturation !== undefined && l.saturation !== 100) filters.push(`saturate(${l.saturation}%)`);
          if (l.grayscale !== undefined && l.grayscale > 0) filters.push(`grayscale(${l.grayscale}%)`);
          if (l.blur !== undefined && l.blur > 0) filters.push(`blur(${l.blur}px)`);
          
          if (filters.length > 0) ctx.filter = filters.join(' ');
          else ctx.filter = 'none';

          ctx.drawImage(l.img, -l.w / 2, -l.h / 2, l.w, l.h);
          ctx.filter = 'none'; // Reset after drawing
        }

        /* --- SHAPE / TEACHER PHOTO FRAME --- */
        else if (l.type === 'shape') {
          ctx.beginPath();
          if (l.sType === 'rect') {
            const r = l.radius || 0;
            const sx = -l.w / 2; const sy = -l.h / 2;
            ctx.moveTo(sx + r, sy); ctx.lineTo(sx + l.w - r, sy);
            ctx.quadraticCurveTo(sx + l.w, sy, sx + l.w, sy + r); ctx.lineTo(sx + l.w, sy + l.h - r);
            ctx.quadraticCurveTo(sx + l.w, sy + l.h, sx + l.w - r, sy + l.h); ctx.lineTo(sx + r, sy + l.h);
            ctx.quadraticCurveTo(sx, sy + l.h, sx, sy + l.h - r); ctx.lineTo(sx, sy + r);
            ctx.quadraticCurveTo(sx, sy, sx + r, sy);
          } else if (l.sType === 'circle') {
            ctx.arc(0, 0, l.w / 2, 0, Math.PI * 2);
          } else if (l.sType === 'triangle') {
            ctx.moveTo(0, -l.h / 2);
            ctx.lineTo(l.w / 2, l.h / 2);
            ctx.lineTo(-l.w / 2, l.h / 2);
          } else if (l.sType === 'star') {
            const spikes = 5; const outerRadius = l.w / 2; const innerRadius = l.w / 4;
            let rot = Math.PI / 2 * 3; let x = 0; let y = 0; const step = Math.PI / spikes;
            ctx.moveTo(0, -outerRadius);
            for (let j = 0; j < spikes; j++) {
              x = Math.cos(rot) * outerRadius; y = Math.sin(rot) * outerRadius; ctx.lineTo(x, y); rot += step;
              x = Math.cos(rot) * innerRadius; y = Math.sin(rot) * innerRadius; ctx.lineTo(x, y); rot += step;
            }
          } else if (l.sType === 'polygon') {
            const sides = 6; const r = l.w / 2;
            ctx.moveTo(r * Math.cos(-Math.PI / 2), r * Math.sin(-Math.PI / 2));
            for (let j = 1; j < sides; j++) {
              const ang = (j * 2 * Math.PI / sides) - Math.PI / 2;
              ctx.lineTo(r * Math.cos(ang), r * Math.sin(ang));
            }
          } else if (l.sType === 'badge') {
            const spikes = 16; const outer = l.w / 2; const inner = l.w / 2.2;
            ctx.moveTo(outer, 0);
            for (let j = 1; j < spikes * 2; j++) {
              const r = j % 2 === 0 ? outer : inner;
              const ang = j * Math.PI / spikes;
              ctx.lineTo(r * Math.cos(ang), r * Math.sin(ang));
            }
          } else if (l.sType === 'ribbon') {
            const hw = l.w / 2; const hh = l.h / 2;
            const bend = l.w * 0.1;
            ctx.moveTo(-hw, -hh); 
            ctx.lineTo(hw, -hh); 
            ctx.lineTo(hw - bend, 0); 
            ctx.lineTo(hw, hh); 
            ctx.lineTo(-hw, hh); 
            ctx.lineTo(-hw + bend, 0);
          } else if (l.sType === 'line') {
            ctx.moveTo(-l.w / 2, 0);
            ctx.lineTo(l.w / 2, 0);
          }
          ctx.closePath();

          if (l.clipImg) {
            // Clipping Mask Logic (Photo inside Shape)
            ctx.save();
            ctx.clip();
            
            // Apply Retouching Filters to Clipped Image
            const filters = [];
            if (l.brightness !== undefined && l.brightness !== 100) filters.push(`brightness(${l.brightness}%)`);
            if (l.contrast !== undefined && l.contrast !== 100) filters.push(`contrast(${l.contrast}%)`);
            if (l.saturation !== undefined && l.saturation !== 100) filters.push(`saturate(${l.saturation}%)`);
            if (l.grayscale !== undefined && l.grayscale > 0) filters.push(`grayscale(${l.grayscale}%)`);
            if (l.blur !== undefined && l.blur > 0) filters.push(`blur(${l.blur}px)`);
            
            if (filters.length > 0) ctx.filter = filters.join(' ');
            else ctx.filter = 'none';

            const imgRatio = l.clipImg.width / l.clipImg.height;
            const boxRatio = l.sType === 'rect' ? (l.w / l.h) : 1;
            let cw = l.w, ch = l.h;
            if (imgRatio > boxRatio) { cw = ch * imgRatio; } else { ch = cw / imgRatio; }
            ctx.drawImage(l.clipImg, -cw / 2, -ch / 2, cw, ch);
            ctx.filter = 'none'; // Reset filter
            ctx.restore();
          }
          else {
            // Shape Fill Logic
            const sh = (l.sType === 'rect' || l.sType === 'triangle' || l.sType === 'ribbon') ? l.h : l.w;
            if (l.gType === 'linear') {
              const ang = (l.gAngle || 0) * Math.PI / 180;
              const g = ctx.createLinearGradient(-Math.cos(ang) * l.w / 2, -Math.sin(ang) * sh / 2, Math.cos(ang) * l.w / 2, Math.sin(ang) * sh / 2);
              g.addColorStop(0, l.color); 
              if (l.color2) g.addColorStop(0.5, l.color2);
              g.addColorStop(1, l.color3 || '#000');
              ctx.fillStyle = g;
            } else if (l.gType === 'radial') {
              const g = ctx.createRadialGradient(0, 0, 0, 0, 0, l.w / 2);
              g.addColorStop(0, l.color); 
              if (l.color2) g.addColorStop(0.5, l.color2);
              g.addColorStop(1, l.color3 || '#000');
              ctx.fillStyle = g;
            } else if (l.gType === 'gold') {
              const g = ctx.createLinearGradient(-l.w / 2, -sh / 2, l.w / 2, sh / 2);
              g.addColorStop(0, '#bf953f'); g.addColorStop(0.2, '#fcf6ba'); g.addColorStop(0.5, '#b38728'); g.addColorStop(0.8, '#fcf6ba'); g.addColorStop(1, '#aa8029');
              ctx.fillStyle = g;
            } else if (l.gType === 'silver') {
              const g = ctx.createLinearGradient(-l.w / 2, -sh / 2, l.w / 2, sh / 2);
              g.addColorStop(0, '#777'); g.addColorStop(0.5, '#eee'); g.addColorStop(1, '#777');
              ctx.fillStyle = g;
            } else if (l.gType === 'glass') {
              ctx.fillStyle = 'rgba(255,255,255,0.1)';
              ctx.shadowColor = 'rgba(255,255,255,0.2)'; ctx.shadowBlur = 10;
            } else {
              ctx.fillStyle = l.color;
            }
            ctx.fill();
            ctx.shadowBlur = 0; // Reset shadow
          }

          // Border / Stroke
          if (l.strokeW > 0) {
            ctx.lineWidth = l.strokeW;
            ctx.strokeStyle = l.strokeC || '#ffffff';
            ctx.stroke();
          }
        }

        /* --- TEXT LAYER --- */
        else if (l.type === 'text') {
          const lines = l.text.split('\n');
          const lh = l.size * 1.15;
          const totalH = (lines.length - 1) * lh;

          ctx.textAlign = l.align; ctx.textBaseline = 'middle';
          ctx.font = `${l.weight} ${l.size}px ${l.font}, sans-serif`;
          if (ctx.letterSpacing !== undefined) ctx.letterSpacing = l.spacing + "px";

          lines.forEach((line, li) => {
            const ly = -(totalH / 2) + (li * lh);

            // Outline Stroke (Drawn behind)
            if (l.strokeW > 0) {
              ctx.lineJoin = 'round'; ctx.lineWidth = l.strokeW; ctx.strokeStyle = l.strokeC;
              ctx.strokeText(line, 0, ly);
            }

            // Fill Colors
            if (l.style === '3dgold') {
              const depth = Math.min(15, l.size * 0.15);
              for (let j = depth; j >= 1; j--) {
                ctx.fillStyle = '#664200';
                ctx.fillText(line, 0, ly + j);
              }
              const grad = ctx.createLinearGradient(0, ly - l.size / 2, 0, ly + l.size / 2);
              grad.addColorStop(0, '#fff6cc'); grad.addColorStop(0.5, '#f5d06e'); grad.addColorStop(1, '#8b5e1a');
              ctx.fillStyle = grad; ctx.fillText(line, 0, ly);
            } else if (l.style === 'cyber') {
              ctx.shadowColor = '#ff00ff'; ctx.shadowBlur = 15;
              ctx.strokeStyle = '#00ffff'; ctx.lineWidth = 2; ctx.strokeText(line, 2, 2);
              ctx.fillStyle = '#ffffff'; ctx.fillText(line, 0, 0);
            } else if (l.style === 'royal') {
              const grad = ctx.createLinearGradient(0, ly - l.size / 2, 0, ly + l.size / 2);
              grad.addColorStop(0, '#6a1b9a'); grad.addColorStop(0.5, '#ffd700'); grad.addColorStop(1, '#4a148c');
              ctx.fillStyle = grad; ctx.fillText(line, 0, ly);
              ctx.shadowColor = 'rgba(0,0,0,0.5)'; ctx.shadowBlur = 5;
            } else if (l.style === 'forest') {
              const grad = ctx.createLinearGradient(0, ly - l.size / 2, 0, ly + l.size / 2);
              grad.addColorStop(0, '#2e7d32'); grad.addColorStop(0.5, '#a5d6a7'); grad.addColorStop(1, '#1b5e20');
              ctx.fillStyle = grad; ctx.fillText(line, 0, ly);
            } else if (l.style === 'sunset') {
              const grad = ctx.createLinearGradient(0, ly - l.size / 2, 0, ly + l.size / 2);
              grad.addColorStop(0, '#ff512f'); grad.addColorStop(1, '#dd2476');
              ctx.fillStyle = grad; ctx.fillText(line, 0, ly);
            } else if (l.style === 'ocean') {
              const grad = ctx.createLinearGradient(0, ly - l.size / 2, 0, ly + l.size / 2);
              grad.addColorStop(0, '#2193b0'); grad.addColorStop(1, '#6dd5ed');
              ctx.fillStyle = grad; ctx.fillText(line, 0, ly);
            } else if (l.style === 'metal') {
              const grad = ctx.createLinearGradient(0, ly - l.size / 2, 0, ly + l.size / 2);
              grad.addColorStop(0, '#777'); grad.addColorStop(0.5, '#eee'); grad.addColorStop(1, '#777');
              ctx.fillStyle = grad; ctx.fillText(line, 0, ly);
              ctx.strokeStyle = 'rgba(255,255,255,0.5)'; ctx.lineWidth = 1; ctx.strokeText(line, 0, ly);
            } else if (l.style === 'matrix') {
              ctx.shadowColor = '#0f0'; ctx.shadowBlur = 10;
              ctx.fillStyle = '#000'; ctx.fillText(line, 0, ly);
              ctx.fillStyle = '#0f0'; ctx.font = `bold ${l.size}px monospace`; ctx.fillText(line, 0, ly);
              ctx.font = `${l.weight} ${l.size}px ${l.font}`;
            } else if (l.style === 'stamp') {
              ctx.fillStyle = l.color; ctx.globalAlpha = 0.8;
              ctx.fillText(line, 0, ly);
              ctx.strokeStyle = l.color; ctx.lineWidth = 2; ctx.strokeText(line, 1, ly + 1);
              ctx.globalAlpha = 1.0;
            } else if (l.style === 'paper') {
              ctx.shadowColor = 'rgba(0,0,0,0.3)'; ctx.shadowBlur = 5; ctx.shadowOffsetX = 3; ctx.shadowOffsetY = 3;
              ctx.fillStyle = '#fff'; ctx.fillText(line, 0, ly);
              ctx.shadowBlur = 0; ctx.shadowOffsetX = 0; ctx.shadowOffsetY = 0;
            } else if (l.style === 'longshadow') {
              for (let j = 1; j < 30; j++) {
                ctx.fillStyle = hexToRgba(l.color, 20);
                ctx.fillText(line, j, ly + j);
              }
              ctx.fillStyle = l.color; ctx.fillText(line, 0, ly);
            } else if (l.style === 'bubble') {
              const grad = ctx.createRadialGradient(0, ly, 0, 0, ly, l.size);
              grad.addColorStop(0, '#fff'); grad.addColorStop(0.5, l.color); grad.addColorStop(1, l.color);
              ctx.fillStyle = grad; ctx.fillText(line, 0, ly);
            } else if (l.style === 'sketch') {
              ctx.strokeStyle = l.color; ctx.lineWidth = 1;
              ctx.strokeText(line, 1, ly + 1); ctx.strokeText(line, -1, ly - 1);
              ctx.fillStyle = 'transparent'; ctx.fillText(line, 0, ly);
            } else if (l.style === 'chalk') {
              ctx.fillStyle = '#fff'; ctx.globalAlpha = 0.7;
              ctx.font = `italic ${l.size}px 'Comic Sans MS'`;
              ctx.fillText(line, 0, ly);
              ctx.font = `${l.weight} ${l.size}px ${l.font}`;
              ctx.globalAlpha = 1.0;
            } else if (l.style === 'lava') {
              const grad = ctx.createLinearGradient(0, ly - l.size / 2, 0, ly + l.size / 2);
              grad.addColorStop(0, '#ff0'); grad.addColorStop(0.5, '#f60'); grad.addColorStop(1, '#300');
              ctx.fillStyle = grad; ctx.fillText(line, 0, ly);
              ctx.shadowColor = '#f30'; ctx.shadowBlur = 20;
            } else if (l.style === 'chrome') {
              const grad = ctx.createLinearGradient(0, ly - l.size / 2, 0, ly + l.size / 2);
              grad.addColorStop(0, '#444'); grad.addColorStop(0.2, '#fff'); grad.addColorStop(0.5, '#aaa'); grad.addColorStop(0.8, '#fff'); grad.addColorStop(1, '#444');
              ctx.fillStyle = grad; ctx.fillText(line, 0, ly);
            } else if (l.style === 'retro') {
              ctx.fillStyle = '#ff00ff'; ctx.fillText(line, 4, ly + 4);
              ctx.fillStyle = '#00ffff'; ctx.fillText(line, -2, ly - 2);
              ctx.fillStyle = l.color; ctx.fillText(line, 0, ly);
            } else if (l.style === 'hologram') {
              const grad = ctx.createLinearGradient(-100, 0, 100, 0);
              grad.addColorStop(0, '#00ffff'); grad.addColorStop(0.5, '#ff00ff'); grad.addColorStop(1, '#00ffff');
              ctx.globalAlpha = 0.6; ctx.fillStyle = grad; ctx.fillText(line, 2, ly);
              ctx.globalAlpha = 1.0; ctx.fillStyle = '#fff'; ctx.fillText(line, 0, ly);
            } else if (l.style === 'comic') {
              ctx.strokeStyle = '#000'; ctx.lineWidth = 8; ctx.strokeText(line, 0, ly);
              ctx.fillStyle = l.color; ctx.fillText(line, 0, ly);
              ctx.fillStyle = '#fff'; ctx.globalAlpha = 0.3; ctx.fillText(line, -2, ly - 2); ctx.globalAlpha = 1.0;
            } else if (l.style === 'glass') {
              ctx.shadowColor = 'rgba(255,255,255,0.5)'; ctx.shadowBlur = 10;
              ctx.fillStyle = 'rgba(255,255,255,0.2)'; ctx.fillText(line, 0, ly);
              ctx.strokeStyle = 'rgba(255,255,255,0.5)'; ctx.lineWidth = 1; ctx.strokeText(line, 0, ly);
            } else if (l.style === 'electric') {
              ctx.shadowColor = '#0088ff'; ctx.shadowBlur = 20;
              ctx.strokeStyle = '#fff'; ctx.lineWidth = 2; ctx.strokeText(line, Math.random() * 4, ly + Math.random() * 4);
              ctx.fillStyle = '#fff'; ctx.fillText(line, 0, ly);
            } else if (l.style === 'wood') {
              const grad = ctx.createLinearGradient(0, ly - l.size / 2, 0, ly + l.size / 2);
              grad.addColorStop(0, '#8B4513'); grad.addColorStop(0.5, '#A0522D'); grad.addColorStop(1, '#8B4513');
              ctx.fillStyle = grad; ctx.fillText(line, 0, ly);
              ctx.strokeStyle = 'rgba(0,0,0,0.3)'; ctx.lineWidth = 1; ctx.strokeText(line, 0, ly);
            } else if (l.style === 'stone') {
              ctx.fillStyle = '#666'; ctx.fillText(line, 2, ly + 2);
              ctx.fillStyle = '#aaa'; ctx.fillText(line, 0, ly);
              ctx.strokeStyle = '#444'; ctx.lineWidth = 1; ctx.strokeText(line, 0, ly);
            } else if (l.style === 'water') {
              ctx.shadowColor = '#00bbff'; ctx.shadowBlur = 15;
              const grad = ctx.createLinearGradient(0, ly - l.size / 2, 0, ly + l.size / 2);
              grad.addColorStop(0, 'rgba(255,255,255,0.8)'); grad.addColorStop(0.5, '#0099ff'); grad.addColorStop(1, '#004466');
              ctx.fillStyle = grad; ctx.fillText(line, 0, ly);
            } else if (l.style === 'neon') {
              ctx.shadowColor = l.color; ctx.shadowBlur = 25; ctx.shadowOffsetX = 0; ctx.shadowOffsetY = 0;
              ctx.fillStyle = '#ffffff'; ctx.fillText(line, 0, ly);
              ctx.shadowBlur = 15; ctx.fillStyle = l.color; ctx.fillText(line, 0, ly);
              ctx.shadowBlur = 0;
            } else if (l.style === 'plastic') {
              ctx.fillStyle = '#000000'; ctx.globalAlpha = 0.3; ctx.fillText(line, 2, ly + 2); ctx.globalAlpha = l.opacity / 100;
              const grad = ctx.createLinearGradient(0, ly - l.size / 2, 0, ly + l.size / 2);
              grad.addColorStop(0, '#ffffff'); grad.addColorStop(0.5, l.color); grad.addColorStop(1, '#000000');
              ctx.fillStyle = grad; ctx.fillText(line, 0, ly);
            } else if (l.style === 'shadow') {
              ctx.shadowColor = 'rgba(0,0,0,0.5)'; ctx.shadowBlur = 10; ctx.shadowOffsetX = 4; ctx.shadowOffsetY = 4;
              ctx.fillStyle = l.color; ctx.fillText(line, 0, ly);
              ctx.shadowBlur = 0; ctx.shadowOffsetX = 0; ctx.shadowOffsetY = 0;
            } else if (l.style === 'outline') {
              ctx.lineWidth = Math.max(4, l.size * 0.08); ctx.strokeStyle = '#000000'; ctx.lineJoin = 'round'; ctx.strokeText(line, 0, ly);
              ctx.fillStyle = l.color; ctx.fillText(line, 0, ly);
            } else if (l.style === 'gradient') {
              const grad = ctx.createLinearGradient(-ctx.measureText(line).width / 2, 0, ctx.measureText(line).width / 2, 0);
              grad.addColorStop(0, '#ff0055'); grad.addColorStop(0.5, '#ffaa00'); grad.addColorStop(1, '#ff0055');
              ctx.fillStyle = grad; ctx.fillText(line, 0, ly);
            } else if (l.style === 'fire') {
              ctx.shadowColor = '#ff4400'; ctx.shadowBlur = 20; ctx.fillStyle = '#ff6600'; ctx.fillText(line, 0, ly);
              ctx.shadowBlur = 10; ctx.fillStyle = '#ffcc00'; ctx.fillText(line, 0, ly);
              ctx.shadowBlur = 0; ctx.fillStyle = '#ffffff'; ctx.fillText(line, 0, ly - 1);
            } else if (l.style === 'ice') {
              ctx.shadowColor = '#00ccff'; ctx.shadowBlur = 20; ctx.fillStyle = '#e0f7ff'; ctx.fillText(line, 0, ly);
              ctx.shadowBlur = 0; ctx.strokeStyle = '#00aaff'; ctx.lineWidth = 2; ctx.strokeText(line, 0, ly);
            } else if (l.style === 'rainbow') {
              const grad = ctx.createLinearGradient(-ctx.measureText(line).width / 2, 0, ctx.measureText(line).width / 2, 0);
              grad.addColorStop(0, '#ff0000'); grad.addColorStop(0.17, '#ff8800'); grad.addColorStop(0.33, '#ffff00');
              grad.addColorStop(0.5, '#00ff00'); grad.addColorStop(0.67, '#0088ff'); grad.addColorStop(0.83, '#8800ff'); grad.addColorStop(1, '#ff0088');
              ctx.fillStyle = grad; ctx.fillText(line, 0, ly);
            } else {
              ctx.fillStyle = l.color;
              ctx.fillText(line, 0, ly);
            }
          });
        }

        ctx.restore();

        // Selection Bounding Box Overlay
        if (selectedId === l.id && !isDragging) {
          ctx.save();
          ctx.translate(l.x, l.y);
          ctx.rotate(l.rotation * Math.PI / 180);
          ctx.strokeStyle = '#0d99ff'; ctx.lineWidth = 2;

          let bw = 0, bh = 0;
          const sh = (l.sType === 'rect' || l.sType === 'triangle' || l.sType === 'ribbon' || l.sType === 'line') ? (l.h || l.w) : l.w;
          if (l.type === 'shape' || l.type === 'image' || l.type === 'html') { 
            bw = l.w; 
            bh = (l.type === 'shape' && l.sType === 'line') ? 20 : sh; 
          }
          else if (l.type === 'text') {
            ctx.font = `${l.weight} ${l.size}px ${l.font}`;
            const lines = l.text.split('\n');
            bw = Math.max(...lines.map(x => ctx.measureText(x).width + (x.length * l.spacing)));
            bh = lines.length * (l.size * 1.15);
          }

          let bx = -bw / 2;
          if (l.type === 'text') {
            if (l.align === 'left') bx = 0;
            if (l.align === 'right') bx = -bw;
          }

          ctx.strokeRect(bx - 5, -bh / 2 - 5, bw + 10, bh + 10);
          // Nodes
          ctx.fillStyle = '#fff'; 
          const nodes = [
            [bx - 5, -bh / 2 - 5],
            [bx + bw + 5, -bh / 2 - 5],
            [bx - 5, bh / 2 + 5],
            [bx + bw + 5, bh / 2 + 5]
          ];
          nodes.forEach(n => {
            ctx.beginPath(); ctx.arc(n[0], n[1], 4, 0, Math.PI * 2); ctx.fill(); ctx.stroke();
          });
          ctx.restore();
        }
      }

      ctx.restore();
    }

    /* ─── EXPORT & CLIPBOARD ─── */
    function copyToClipboard() {
      const prevId = selectedId; selectedId = null; renderCanvas(); // Hide box
      canvas.toBlob(async blob => {
        try {
          await navigator.clipboard.write([new ClipboardItem({ 'image/png': blob })]);
          toast('📋 Image Copied to Clipboard!');
        } catch (e) { toast('⚠️ Clipboard copy failed.'); }
        selectedId = prevId; renderCanvas();
      }, 'image/png');
    }

    function exportRender() {
      const prevId = selectedId; selectedId = null; renderCanvas(); // Hide box
      canvas.toBlob(blob => {
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = `Tuition_Poster_${W}x${H}.png`;
        a.click();
        toast('✅ HD Poster Downloaded!');
        selectedId = prevId; renderCanvas();
      }, 'image/png', 1.0);
    }

    function generateWebsite() {
      toast('🚀 Generating Production Website...');
      
      const bg = layers[0];
      let layersHtml = '';
      
      // Process layers from bottom to top
      layers.forEach((l, i) => {
        if (l.type === 'bg') return;
        
        let style = `position: absolute; left: ${l.x}px; top: ${l.y}px; transform: translate(-50%, -50%) rotate(${l.rotation}deg); opacity: ${l.opacity / 100}; mix-blend-mode: ${l.blendMode || 'normal'}; z-index: ${i};`;
        
        // Add Retouching Filters to Style
        let filters = [];
        if (l.brightness !== undefined && l.brightness !== 100) filters.push(`brightness(${l.brightness}%)`);
        if (l.contrast !== undefined && l.contrast !== 100) filters.push(`contrast(${l.contrast}%)`);
        if (l.saturation !== undefined && l.saturation !== 100) filters.push(`saturate(${l.saturation}%)`);
        if (l.grayscale !== undefined && l.grayscale > 0) filters.push(`grayscale(${l.grayscale}%)`);
        if (l.blur !== undefined && l.blur > 0) filters.push(`blur(${l.blur}px)`);
        if (filters.length > 0) style += `filter: ${filters.join(' ')};`;

        if (l.type === 'text') {
          style += `font-family: ${l.font}; font-size: ${l.size}px; color: ${l.color}; font-weight: ${l.weight}; text-align: ${l.align}; letter-spacing: ${l.spacing}px; line-height: 1.15; white-space: pre-wrap; width: auto;`;
          if (l.strokeW > 0) {
             style += `-webkit-text-stroke: ${l.strokeW}px ${l.strokeC};`;
          }
          // Basic effect mapping for CSS
          if (l.style === 'neon') style += `text-shadow: 0 0 10px ${l.color}, 0 0 20px ${l.color}; color: #fff;`;
          if (l.style === 'shadow') style += `text-shadow: 4px 4px 4px rgba(0,0,0,0.5);`;
          
          layersHtml += `<div style="${style}">${l.text.replace(/\n/g, '<br>')}</div>\n`;
        }
        else if (l.type === 'shape') {
          let borderRadius = l.sType === 'circle' ? '50%' : (l.radius || 0) + 'px';
          let clipPath = '';
          const sh = (l.sType === 'rect' || l.sType === 'triangle' || l.sType === 'ribbon') ? l.h : l.w;

          if (l.sType === 'triangle') {
            clipPath = 'polygon(50% 0%, 0% 100%, 100% 100%)';
          } else if (l.sType === 'star') {
            clipPath = 'polygon(50% 0%, 61% 35%, 98% 35%, 68% 57%, 79% 91%, 50% 70%, 21% 91%, 32% 57%, 2% 35%, 39% 35%)';
          } else if (l.sType === 'polygon') {
            clipPath = 'polygon(25% 0%, 75% 0%, 100% 50%, 75% 100%, 25% 100%, 0% 50%)';
          } else if (l.sType === 'badge') {
            clipPath = 'polygon(50% 0%, 60% 6%, 72% 3%, 79% 12%, 91% 12%, 93% 24%, 100% 33%, 97% 45%, 100% 57%, 93% 66%, 95% 79%, 84% 84%, 80% 97%, 68% 95%, 58% 100%, 46% 94%, 34% 98%, 24% 89%, 12% 91%, 9% 79%, 0% 72%, 4% 60%, 0% 47%, 7% 37%, 4% 24%, 14% 17%, 17% 4%, 29% 7%, 39% 0%)';
          } else if (l.sType === 'ribbon') {
             const b = (sh > 0) ? (l.w * 0.1 / l.w * 100) : 10;
             clipPath = `polygon(0% 0%, 100% 0%, ${100-b}% 50%, 100% 100%, 0% 100%, ${b}% 50%)`;
          }
          
          style += `width: ${l.w}px; height: ${sh}px; background-color: ${l.color}; border: ${l.sType === 'line' ? 'none' : `${l.strokeW}px solid ${l.strokeC}`}; border-radius: ${borderRadius}; overflow: hidden; ${clipPath ? `clip-path: ${clipPath};` : ''}`;
          
          if (l.sType === 'line') {
            style += `height: ${l.strokeW || 2}px; border-top: ${l.strokeW || 2}px solid ${l.color};`;
          }

          // Shape Gradients for Website
          if (l.gType === 'linear') {
            style += `background: linear-gradient(${l.gAngle || 0}deg, ${l.color}, ${l.color2 ? l.color2 + ',' : ''} ${l.color3 || '#000'});`;
          } else if (l.gType === 'radial') {
            style += `background: radial-gradient(circle, ${l.color}, ${l.color2 ? l.color2 + ',' : ''} ${l.color3 || '#000'});`;
          } else if (l.gType === 'gold') {
            style += `background: linear-gradient(45deg, #bf953f, #fcf6ba, #b38728, #fcf6ba, #aa8029);`;
          } else if (l.gType === 'silver') {
            style += `background: linear-gradient(45deg, #777, #eee, #777);`;
          }

          let content = '';
          if (l.clipImg) {
            content = `<img src="${l.clipImg.src}" style="width: 100%; height: 100%; object-fit: cover;">`;
          }
          layersHtml += `<div style="${style}">${content}</div>\n`;
        }
        else if (l.type === 'image') {
          style += `width: ${l.w}px; height: ${l.h}px;`;
          layersHtml += `<img src="${l.img.src}" style="${style}">\n`;
        }
        else if (l.type === 'html') {
          style += `width: ${l.w}px; height: ${l.h}px; border: none;`;
          layersHtml += `<iframe src="${l.src}" style="${style}" scrolling="no"></iframe>\n`;
        }
      });

      const fullHtml = `
<!DOCTYPE html>
<html lang="si">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Generated Poster Website</title>
  <link href="https://fonts.googleapis.com/css2?family=Anek+Sinhala:wght@400;700;800;900&family=Noto+Sans+Sinhala:wght@400;700;900&family=Noto+Serif+Sinhala:wght@400;700&family=Abhaya+Libre:wght@600;800&family=Gemunu+Libre:wght@400;700;800&family=Yaldevi:wght@400;600;700&family=Maname&family=Baloo+2:wght@400;700;800&family=Poppins:wght@400;600;800&family=Montserrat:wght@400;700;900&family=Bebas+Neue&family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
  <style>
    body {
      margin: 0;
      padding: 0;
      overflow-x: hidden;
      background: #000;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }
    #site-container {
      width: ${W}px;
      height: ${H}px;
      position: relative;
      background: linear-gradient(${bg.angle}deg, ${bg.c1}, ${bg.c2});
      box-shadow: 0 20px 50px rgba(0,0,0,0.5);
      overflow: hidden;
      flex-shrink: 0;
    }
    @media (max-width: ${W}px) {
      #site-container {
        transform: scale(calc(100vw / ${W}));
        transform-origin: center center;
      }
    }
  </style>
</head>
<body>
  <div id="site-container">
    ${layersHtml}
  </div>
</body>
</html>`;

      const blob = new Blob([fullHtml], { type: 'text/html' });
      const a = document.createElement('a');
      a.href = URL.createObjectURL(blob);
      a.download = 'tuition_website.html';
      a.click();
      
      toast('✨ Website Generated & Downloaded!');
    }
  </script>
</body>

</html>
