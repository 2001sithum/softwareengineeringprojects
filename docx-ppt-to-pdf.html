<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>DOCX &amp; PPT → PDF Converter</title>

<!-- Libraries -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/mammoth/1.6.0/mammoth.browser.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

<style>
@import url('https://fonts.googleapis.com/css2?family=DM+Mono:ital,wght@0,300;0,400;0,500;1,300&family=DM+Serif+Display&display=swap');

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #0c0c0d;
  --surface: #141416;
  --surface2: #1c1c1f;
  --border: #272729;
  --border2: #333336;
  --accent: #e2cc8e;
  --accent2: #c4a45a;
  --text: #ddd8d0;
  --muted: #65625c;
  --muted2: #8a877f;
  --danger: #d97070;
  --success: #72b894;
  --info: #7ab0d4;
  --preview-bg: #faf8f4;
  --preview-text: #1c1914;
}

html, body { min-height: 100vh; background: var(--bg); color: var(--text); font-family: 'DM Mono', monospace; }

/* ─── HEADER ─── */
header {
  padding: 1.6rem 2.5rem;
  border-bottom: 1px solid var(--border);
  display: flex; align-items: center; justify-content: space-between;
}
.logo { display: flex; align-items: baseline; gap: 0.75rem; }
.logo-title {
  font-family: 'DM Serif Display', serif;
  font-size: 1.35rem;
  color: var(--accent);
  letter-spacing: -0.01em;
}
.logo-sub { font-size: 0.7rem; color: var(--muted); font-weight: 300; }
.header-badges { display: flex; gap: 0.5rem; }
.chip {
  font-size: 0.62rem; font-weight: 500; letter-spacing: 0.06em;
  padding: 0.25em 0.7em; border-radius: 2px; border: 1px solid;
  text-transform: uppercase;
}
.chip-docx { color: var(--info); border-color: color-mix(in srgb, var(--info) 40%, transparent); }
.chip-ppt  { color: #d4886a; border-color: color-mix(in srgb, #d4886a 40%, transparent); }

/* ─── MAIN LAYOUT ─── */
main { display: grid; grid-template-columns: 1fr 1fr; min-height: calc(100vh - 68px); }

/* ─── LEFT PANEL ─── */
.left-panel {
  border-right: 1px solid var(--border);
  padding: 2rem 2.5rem;
  display: flex; flex-direction: column; gap: 1.6rem;
}

/* Tabs */
.tabs { display: flex; gap: 0; border-bottom: 1px solid var(--border); margin-bottom: 0.5rem; }
.tab {
  padding: 0.5rem 1.2rem; font-size: 0.75rem; cursor: pointer;
  color: var(--muted); border-bottom: 2px solid transparent;
  transition: all 0.2s; background: none; border-top: none; border-left: none; border-right: none;
  font-family: 'DM Mono', monospace; letter-spacing: 0.04em;
}
.tab:hover { color: var(--text); }
.tab.active { color: var(--accent); border-bottom-color: var(--accent); }

/* Drop zone */
.dropzone {
  border: 1px dashed var(--border2);
  border-radius: 6px;
  padding: 3rem 2rem;
  text-align: center;
  cursor: pointer;
  transition: all 0.25s;
  background: var(--surface);
  position: relative;
}
.dropzone:hover, .dropzone.drag-over {
  border-color: var(--accent2);
  background: color-mix(in srgb, var(--accent) 4%, var(--surface));
}
.dropzone input[type=file] {
  position: absolute; inset: 0; opacity: 0; cursor: pointer; width: 100%; height: 100%;
}
.dz-icon { font-size: 2.5rem; line-height: 1; margin-bottom: 0.8rem; }
.dz-label { font-size: 0.8rem; color: var(--muted2); line-height: 1.6; }
.dz-label strong { color: var(--accent); font-weight: 500; }
.dz-accept { font-size: 0.65rem; color: var(--muted); margin-top: 0.4rem; }

/* File info */
.file-info {
  display: none; align-items: center; gap: 1rem;
  background: var(--surface2); border: 1px solid var(--border2);
  border-radius: 6px; padding: 1rem 1.2rem;
}
.file-info.show { display: flex; }
.file-icon-wrap {
  width: 40px; height: 40px; border-radius: 4px;
  display: flex; align-items: center; justify-content: center;
  font-size: 1.2rem; flex-shrink: 0;
}
.file-icon-wrap.docx { background: color-mix(in srgb, var(--info) 15%, transparent); }
.file-icon-wrap.pptx { background: color-mix(in srgb, #d4886a 15%, transparent); }
.file-details { flex: 1; min-width: 0; }
.file-name { font-size: 0.8rem; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.file-size { font-size: 0.65rem; color: var(--muted); margin-top: 0.15rem; }
.file-remove {
  background: none; border: none; color: var(--muted); cursor: pointer;
  font-size: 1rem; padding: 0.3rem; border-radius: 3px; transition: color 0.2s;
  font-family: monospace;
}
.file-remove:hover { color: var(--danger); }

/* Settings */
.settings-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 0.8rem; }
.setting-group { display: flex; flex-direction: column; gap: 0.35rem; }
.setting-label { font-size: 0.65rem; color: var(--muted); letter-spacing: 0.08em; text-transform: uppercase; }
select, input[type=text] {
  background: var(--surface2); border: 1px solid var(--border2);
  color: var(--text); font-family: 'DM Mono', monospace; font-size: 0.75rem;
  padding: 0.5rem 0.7rem; border-radius: 4px; outline: none;
  transition: border-color 0.2s; appearance: none;
}
select:focus, input[type=text]:focus { border-color: var(--accent2); }

/* Convert button */
.btn-convert {
  width: 100%; padding: 0.85rem;
  background: var(--accent); color: #0c0c0d;
  border: none; border-radius: 4px; cursor: pointer;
  font-family: 'DM Mono', monospace; font-size: 0.8rem;
  font-weight: 500; letter-spacing: 0.08em; text-transform: uppercase;
  transition: all 0.2s; position: relative; overflow: hidden;
}
.btn-convert:hover:not(:disabled) { background: var(--accent2); transform: translateY(-1px); }
.btn-convert:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }

/* Progress */
.progress-wrap { display: none; flex-direction: column; gap: 0.5rem; }
.progress-wrap.show { display: flex; }
.progress-bar-bg {
  height: 3px; background: var(--border2); border-radius: 2px; overflow: hidden;
}
.progress-bar {
  height: 100%; background: var(--accent);
  transition: width 0.3s ease; width: 0%;
}
.progress-label { font-size: 0.7rem; color: var(--muted2); }

/* Status */
.status-msg {
  font-size: 0.75rem; padding: 0.6rem 0.9rem; border-radius: 4px;
  border: 1px solid; display: none;
}
.status-msg.show { display: block; }
.status-msg.error { color: var(--danger); border-color: color-mix(in srgb, var(--danger) 35%, transparent); background: color-mix(in srgb, var(--danger) 8%, transparent); }
.status-msg.success { color: var(--success); border-color: color-mix(in srgb, var(--success) 35%, transparent); background: color-mix(in srgb, var(--success) 8%, transparent); }

/* Download */
.btn-download {
  display: none; width: 100%; padding: 0.75rem;
  background: transparent; border: 1px solid var(--success); color: var(--success);
  border-radius: 4px; cursor: pointer; font-family: 'DM Mono', monospace;
  font-size: 0.78rem; letter-spacing: 0.06em; text-transform: uppercase;
  transition: all 0.2s; text-align: center; text-decoration: none;
}
.btn-download.show { display: block; }
.btn-download:hover { background: color-mix(in srgb, var(--success) 12%, transparent); }

/* ─── RIGHT PANEL (Preview) ─── */
.right-panel {
  display: flex; flex-direction: column;
  background: var(--surface);
}
.preview-header {
  padding: 1rem 1.5rem;
  border-bottom: 1px solid var(--border);
  display: flex; align-items: center; justify-content: space-between;
}
.preview-title { font-size: 0.7rem; color: var(--muted); letter-spacing: 0.1em; text-transform: uppercase; }
.preview-info { font-size: 0.65rem; color: var(--muted); }
.preview-body {
  flex: 1; overflow: auto; padding: 2rem;
  display: flex; align-items: flex-start; justify-content: center;
}
.preview-empty {
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  height: 100%; color: var(--muted); text-align: center; gap: 0.8rem;
  font-size: 0.78rem; line-height: 1.7;
}
.preview-empty-icon { font-size: 3rem; opacity: 0.3; }

/* DOCX preview frame */
#docx-preview-frame {
  width: 100%; max-width: 680px;
  background: var(--preview-bg); color: var(--preview-text);
  padding: 3rem 3.5rem;
  font-family: 'Georgia', serif; font-size: 0.9rem; line-height: 1.75;
  box-shadow: 0 4px 40px rgba(0,0,0,0.5);
  border-radius: 2px; min-height: 400px;
}
#docx-preview-frame h1,h2,h3,h4 { font-family: Georgia, serif; margin: 1.2em 0 0.4em; }
#docx-preview-frame p { margin: 0.5em 0; }
#docx-preview-frame table { border-collapse: collapse; width: 100%; margin: 1em 0; }
#docx-preview-frame td, #docx-preview-frame th { border: 1px solid #c8c4bc; padding: 6px 10px; }
#docx-preview-frame img { max-width: 100%; }

/* PPT preview slides */
#ppt-preview-wrap { width: 100%; display: flex; flex-direction: column; gap: 1.2rem; max-width: 720px; }
.slide-thumb {
  background: #1a1a2e; border-radius: 4px; overflow: hidden;
  box-shadow: 0 3px 20px rgba(0,0,0,0.5); position: relative;
  aspect-ratio: 16/9;
}
.slide-thumb canvas { width: 100% !important; height: 100% !important; display: block; }
.slide-num {
  position: absolute; top: 8px; right: 10px;
  font-size: 0.6rem; color: rgba(255,255,255,0.4); letter-spacing: 0.05em;
}

/* Hidden render area */
#render-area {
  position: fixed; left: -9999px; top: 0;
  width: 960px; background: white;
}
</style>
</head>
<body>

<header>
  <div class="logo">
    <span class="logo-title">convert.io</span>
    <span class="logo-sub">browser-native · no upload · no server</span>
  </div>
  <div class="header-badges">
    <span class="chip chip-docx">DOCX</span>
    <span class="chip chip-ppt">PPT · PPTX</span>
    <span class="chip" style="color:var(--muted);border-color:var(--border2);">→ PDF</span>
  </div>
</header>

<main>
  <!-- LEFT -->
  <div class="left-panel">

    <div class="tabs">
      <button class="tab active" data-tab="docx">📄 Word (.docx)</button>
      <button class="tab" data-tab="ppt">📊 PowerPoint (.pptx)</button>
    </div>

    <!-- Drop zone -->
    <div class="dropzone" id="dropzone">
      <input type="file" id="file-input" accept=".docx,.pptx,.ppt" />
      <div class="dz-icon" id="dz-icon">📄</div>
      <div class="dz-label" id="dz-label">
        <strong>Drop your file here</strong><br>or click to browse
      </div>
      <div class="dz-accept" id="dz-accept">Accepts .docx files</div>
    </div>

    <!-- File info -->
    <div class="file-info" id="file-info">
      <div class="file-icon-wrap docx" id="file-icon-wrap">📄</div>
      <div class="file-details">
        <div class="file-name" id="file-name">—</div>
        <div class="file-size" id="file-size">—</div>
      </div>
      <button class="file-remove" id="file-remove" title="Remove file">✕</button>
    </div>

    <!-- Settings -->
    <div class="settings-grid">
      <div class="setting-group">
        <label class="setting-label">Page Size</label>
        <select id="page-size">
          <option value="a4">A4</option>
          <option value="letter">US Letter</option>
          <option value="legal">Legal</option>
        </select>
      </div>
      <div class="setting-group">
        <label class="setting-label">Orientation</label>
        <select id="orientation">
          <option value="portrait">Portrait</option>
          <option value="landscape">Landscape</option>
        </select>
      </div>
      <div class="setting-group">
        <label class="setting-label">Output filename</label>
        <input type="text" id="output-name" placeholder="output.pdf" value="output.pdf" />
      </div>
      <div class="setting-group">
        <label class="setting-label">Image quality</label>
        <select id="img-quality">
          <option value="2">High (2×)</option>
          <option value="1.5">Medium (1.5×)</option>
          <option value="1">Standard (1×)</option>
        </select>
      </div>
    </div>

    <!-- Convert -->
    <button class="btn-convert" id="btn-convert" disabled>Convert to PDF</button>

    <!-- Progress -->
    <div class="progress-wrap" id="progress-wrap">
      <div class="progress-bar-bg"><div class="progress-bar" id="progress-bar"></div></div>
      <div class="progress-label" id="progress-label">Preparing…</div>
    </div>

    <!-- Status -->
    <div class="status-msg" id="status-msg"></div>

    <!-- Download -->
    <a class="btn-download" id="btn-download" download="output.pdf">⬇ Download PDF</a>

  </div>

  <!-- RIGHT: Preview -->
  <div class="right-panel">
    <div class="preview-header">
      <span class="preview-title">Preview</span>
      <span class="preview-info" id="preview-info">No file loaded</span>
    </div>
    <div class="preview-body" id="preview-body">
      <div class="preview-empty" id="preview-empty">
        <div class="preview-empty-icon">🗂</div>
        <div>Upload a file to see a preview<br><span style="color:var(--muted);font-size:0.7rem">DOCX · PPT · PPTX supported</span></div>
      </div>
      <div id="docx-preview-frame" style="display:none"></div>
      <div id="ppt-preview-wrap" style="display:none"></div>
    </div>
  </div>
</main>

<!-- Hidden render surface for html2canvas -->
<div id="render-area"></div>

<script>
// ─── State ───────────────────────────────────────────────
let currentFile = null;
let currentMode = 'docx'; // 'docx' | 'ppt'
let pdfBlobUrl   = null;
let parsedSlides = []; // [{html, notes}]

const $ = id => document.getElementById(id);

// ─── Tab switching ────────────────────────────────────────
document.querySelectorAll('.tab').forEach(tab => {
  tab.addEventListener('click', () => {
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    tab.classList.add('active');
    currentMode = tab.dataset.tab;
    updateDropzoneUI();
    resetAll();
  });
});

function updateDropzoneUI() {
  const isPpt = currentMode === 'ppt';
  $('dz-icon').textContent    = isPpt ? '📊' : '📄';
  $('dz-label').innerHTML     = `<strong>Drop your file here</strong><br>or click to browse`;
  $('dz-accept').textContent  = isPpt ? 'Accepts .pptx files' : 'Accepts .docx files';
  $('file-input').accept      = isPpt ? '.pptx,.ppt' : '.docx';
  $('file-icon-wrap').className = `file-icon-wrap ${isPpt ? 'pptx' : 'docx'}`;
  $('file-icon-wrap').textContent = isPpt ? '📊' : '📄';
  if (isPpt) {
    $('orientation').value = 'landscape';
  }
}

// ─── File input & drag/drop ───────────────────────────────
const dz = $('dropzone');
$('file-input').addEventListener('change', e => handleFile(e.target.files[0]));
dz.addEventListener('dragover',  e => { e.preventDefault(); dz.classList.add('drag-over'); });
dz.addEventListener('dragleave', ()  => dz.classList.remove('drag-over'));
dz.addEventListener('drop', e => {
  e.preventDefault(); dz.classList.remove('drag-over');
  handleFile(e.dataTransfer.files[0]);
});
$('file-remove').addEventListener('click', resetAll);

function handleFile(file) {
  if (!file) return;
  const ext = file.name.split('.').pop().toLowerCase();
  const validDocx = currentMode === 'docx' && ext === 'docx';
  const validPpt  = currentMode === 'ppt'  && (ext === 'pptx' || ext === 'ppt');
  if (!validDocx && !validPpt) {
    showStatus(`Please upload a ${currentMode === 'ppt' ? '.pptx' : '.docx'} file.`, 'error');
    return;
  }
  currentFile = file;
  showFileInfo(file);
  $('btn-convert').disabled = false;
  hideStatus(); hideDownload();
  $('output-name').value = file.name.replace(/\.[^.]+$/, '') + '.pdf';
  if (currentMode === 'docx') previewDocx(file);
  else previewPptx(file);
}

function showFileInfo(file) {
  $('file-name').textContent = file.name;
  $('file-size').textContent = formatBytes(file.size);
  $('file-info').classList.add('show');
}

function formatBytes(b) {
  if (b < 1024) return b + ' B';
  if (b < 1048576) return (b/1024).toFixed(1) + ' KB';
  return (b/1048576).toFixed(1) + ' MB';
}

function resetAll() {
  currentFile = null; parsedSlides = [];
  $('file-input').value = '';
  $('file-info').classList.remove('show');
  $('btn-convert').disabled = true;
  $('progress-wrap').classList.remove('show');
  $('progress-bar').style.width = '0%';
  hideStatus(); hideDownload();
  $('docx-preview-frame').style.display = 'none';
  $('ppt-preview-wrap').style.display = 'none';
  $('preview-empty').style.display = 'flex';
  $('preview-info').textContent = 'No file loaded';
}

// ─── DOCX Preview ─────────────────────────────────────────
async function previewDocx(file) {
  try {
    const ab = await file.arrayBuffer();
    const result = await mammoth.convertToHtml({ arrayBuffer: ab });
    const frame = $('docx-preview-frame');
    frame.innerHTML = result.value || '<em style="color:#999">No readable content found.</em>';
    frame.style.display = 'block';
    $('preview-empty').style.display = 'none';
    $('preview-info').textContent = 'DOCX preview';
  } catch(e) {
    showStatus('Preview failed: ' + e.message, 'error');
  }
}

// ─── PPTX Preview ─────────────────────────────────────────
async function previewPptx(file) {
  try {
    $('preview-info').textContent = 'Parsing slides…';
    const slides = await parsePptx(file);
    parsedSlides = slides;
    const wrap = $('ppt-preview-wrap');
    wrap.innerHTML = '';
    slides.forEach((slide, i) => {
      const div = document.createElement('div');
      div.className = 'slide-thumb';
      div.innerHTML = `
        <div style="padding:5% 6%; background:${slide.bg||'#1a1a2e'}; color:${slide.fg||'#fff'}; height:100%; position:relative;">
          ${slide.title ? `<div style="font-size:1.5em;font-weight:700;margin-bottom:0.3em;font-family:serif;">${esc(slide.title)}</div>` : ''}
          ${slide.body  ? `<div style="font-size:0.85em;opacity:0.85;line-height:1.5;">${esc(slide.body)}</div>`  : ''}
        </div>
        <div class="slide-num">Slide ${i+1}</div>`;
      wrap.appendChild(div);
    });
    wrap.style.display = 'flex';
    $('preview-empty').style.display = 'none';
    $('preview-info').textContent = `${slides.length} slide${slides.length!==1?'s':''}`;
  } catch(e) {
    showStatus('Preview error: ' + e.message, 'error');
  }
}

function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

// ─── PPTX Parser (JSZip + raw XML) ────────────────────────
async function parsePptx(file) {
  const zip = await JSZip.loadAsync(await file.arrayBuffer());
  // find slide files
  const slideFiles = Object.keys(zip.files)
    .filter(n => /^ppt\/slides\/slide\d+\.xml$/.test(n))
    .sort((a,b) => {
      const na = parseInt(a.match(/\d+/)[0]), nb = parseInt(b.match(/\d+/)[0]);
      return na - nb;
    });

  const slides = [];
  for (const sf of slideFiles) {
    const xml = await zip.files[sf].async('text');
    const parser = new DOMParser();
    const doc = parser.parseFromString(xml, 'text/xml');

    // Extract all text runs
    const texts = [...doc.querySelectorAll('r > t, t')].map(t => t.textContent).filter(Boolean);

    // Heuristic: first "big" text block = title, rest = body
    const title = texts[0] || '';
    const body  = texts.slice(1).join(' ').slice(0, 300);

    // Try to get background color from spTree/bg
    let bg = '#1e1e2e', fg = '#ffffff';
    const bgNode = doc.querySelector('bg solidFill srgbClr');
    if (bgNode) {
      const val = bgNode.getAttribute('val');
      if (val) {
        bg = '#' + val;
        fg = luminance(val) > 0.4 ? '#111' : '#fff';
      }
    }

    slides.push({ title, body, bg, fg, rawXml: xml });
  }
  return slides;
}

function luminance(hex) {
  const r = parseInt(hex.slice(0,2),16)/255;
  const g = parseInt(hex.slice(2,4),16)/255;
  const b = parseInt(hex.slice(4,6),16)/255;
  return 0.2126*r + 0.7152*g + 0.0722*b;
}

// ─── Convert ──────────────────────────────────────────────
$('btn-convert').addEventListener('click', async () => {
  if (!currentFile) return;
  $('btn-convert').disabled = true;
  hideStatus(); hideDownload();
  showProgress(0, 'Starting…');

  try {
    if (currentMode === 'docx') await convertDocx();
    else await convertPptx();
  } catch(e) {
    showStatus('Conversion failed: ' + e.message, 'error');
    console.error(e);
  }

  $('btn-convert').disabled = false;
  $('progress-wrap').classList.remove('show');
});

// ─── DOCX → PDF ───────────────────────────────────────────
async function convertDocx() {
  showProgress(10, 'Reading document…');
  const ab = await currentFile.arrayBuffer();
  const result = await mammoth.convertToHtml({ arrayBuffer: ab });
  showProgress(40, 'Rendering pages…');

  const renderEl = $('render-area');
  renderEl.innerHTML = `
    <div style="width:870px;padding:80px 90px;font-family:Georgia,serif;font-size:15px;
      line-height:1.8;color:#111;background:#fff;">
      ${result.value}
    </div>`;

  const { jsPDF } = window.jspdf;
  const pageSize  = $('page-size').value;
  const orient    = $('orientation').value;
  const scale     = parseFloat($('img-quality').value);

  const pageDims = { a4:[210,297], letter:[215.9,279.4], legal:[215.9,355.6] };
  const [pw, ph] = pageDims[pageSize];
  const isLand   = orient === 'landscape';
  const docW = isLand ? ph : pw;
  const docH = isLand ? pw : ph;

  const canvas = await html2canvas(renderEl.firstElementChild, {
    scale, useCORS: true, backgroundColor: '#fff', logging: false
  });
  showProgress(80, 'Building PDF…');

  const pdf = new jsPDF({ orientation: orient, unit: 'mm', format: pageSize });
  const imgW  = docW;
  const ratio = canvas.width / canvas.height;
  const totalH = imgW / ratio;
  const pageH  = docH;
  let yOffset = 0;
  let page = 0;

  while (yOffset < totalH) {
    if (page > 0) pdf.addPage();
    const srcY  = (yOffset / totalH) * canvas.height;
    const srcH  = Math.min((pageH / totalH) * canvas.height, canvas.height - srcY);
    const sliceH = Math.round(srcH);
    const sliceCanvas = document.createElement('canvas');
    sliceCanvas.width  = canvas.width;
    sliceCanvas.height = sliceH;
    sliceCanvas.getContext('2d').drawImage(canvas, 0, srcY, canvas.width, sliceH, 0, 0, canvas.width, sliceH);
    const imgData = sliceCanvas.toDataURL('image/jpeg', 0.92);
    const sliceDocH = (sliceH / canvas.height) * totalH;
    pdf.addImage(imgData, 'JPEG', 0, 0, imgW, sliceDocH);
    yOffset += pageH; page++;
  }

  renderEl.innerHTML = '';
  finalize(pdf);
}

// ─── PPTX → PDF ───────────────────────────────────────────
async function convertPptx() {
  if (!parsedSlides.length) {
    const file = currentFile;
    showProgress(5, 'Parsing slides…');
    parsedSlides = await parsePptx(file);
  }

  const { jsPDF } = window.jspdf;
  const scale = parseFloat($('img-quality').value);
  // Slides are 16:9 landscape
  const pdf = new jsPDF({ orientation: 'landscape', unit: 'mm', format: [297, 167.0625] });
  const renderEl = $('render-area');

  for (let i = 0; i < parsedSlides.length; i++) {
    const slide = parsedSlides[i];
    const pct = Math.round(10 + (i / parsedSlides.length) * 80);
    showProgress(pct, `Rendering slide ${i+1} of ${parsedSlides.length}…`);

    renderEl.innerHTML = `
      <div style="width:960px;height:540px;background:${slide.bg||'#1e1e2e'};
        color:${slide.fg||'#fff'};padding:60px 80px;position:relative;overflow:hidden;">
        ${slide.title ? `<h1 style="font-family:'Georgia',serif;font-size:42px;margin:0 0 20px;font-weight:700;line-height:1.2;">${esc(slide.title)}</h1>` : ''}
        ${slide.body  ? `<p style="font-size:22px;line-height:1.6;opacity:0.9;margin:0;white-space:pre-wrap;">${esc(slide.body)}</p>` : ''}
      </div>`;

    const canvas = await html2canvas(renderEl.firstElementChild, {
      scale, useCORS: true, backgroundColor: slide.bg || '#1e1e2e',
      width: 960, height: 540, logging: false
    });

    const imgData = canvas.toDataURL('image/jpeg', 0.92);
    if (i > 0) pdf.addPage([297, 167.0625], 'landscape');
    pdf.addImage(imgData, 'JPEG', 0, 0, 297, 167.0625);
  }

  renderEl.innerHTML = '';
  finalize(pdf);
}

// ─── Finalize ─────────────────────────────────────────────
function finalize(pdf) {
  showProgress(98, 'Finalizing…');
  const filename = $('output-name').value || 'output.pdf';
  const blob = pdf.output('blob');
  if (pdfBlobUrl) URL.revokeObjectURL(pdfBlobUrl);
  pdfBlobUrl = URL.createObjectURL(blob);
  const dlBtn = $('btn-download');
  dlBtn.href = pdfBlobUrl;
  dlBtn.download = filename;
  dlBtn.classList.add('show');
  showStatus(`✓ PDF ready — ${formatBytes(blob.size)}`, 'success');
  showProgress(100, 'Done!');
  setTimeout(() => $('progress-wrap').classList.remove('show'), 600);
}

// ─── UI helpers ───────────────────────────────────────────
function showProgress(pct, label) {
  $('progress-wrap').classList.add('show');
  $('progress-bar').style.width = pct + '%';
  $('progress-label').textContent = label;
}
function showStatus(msg, type) {
  const el = $('status-msg');
  el.textContent = msg;
  el.className = `status-msg show ${type}`;
}
function hideStatus()   { $('status-msg').classList.remove('show'); }
function hideDownload() { $('btn-download').classList.remove('show'); }
</script>
